# Exposure `\(\neq\)` Displacement

.pull-left[
.card.card-top-red[

### The Exposure Approach

Most analyses measure how *exposed* occupations are to AI, then assume exposure equals displacement.

**Geoffrey Hinton (2016):**&lt;br&gt;
*"We should stop training radiologists now."*

**What actually happened:**&lt;br&gt;
AI imaging devices proliferated—and so did the number of radiologist graduates.

]
]

.pull-right[
.card.card-top-blue[

### The Task-Based Approach

We need to understand:

- Which tasks can AI perform?
- Which tasks does AI make humans better at?
- Which tasks does AI make easier to learn?

AI's effect depends on the balance of these forces.

]
]

.footnote[.gray[Hinton prediction: 2016 Machine Learning and Market for Intelligence Conference]]

# Three Channels of AI Impact

&lt;div class="three-card-row"&gt;
  &lt;div class="card card-top-navy channel-card"&gt;
    &lt;div class="channel-icon channel-icon-auto" aria-hidden="true"&gt;

    &lt;/div&gt;
    &lt;h3 class="navy"&gt;Automation&lt;/h3&gt;
    &lt;p&gt;AI fully replaces human labor on specific tasks.&lt;/p&gt;
    &lt;p class="gray"&gt;Example: A robot stacks finished boxes for shipping without a worker.&lt;/p&gt;
  &lt;/div&gt;
  &lt;div class="card card-top-blue channel-card"&gt;
    &lt;div class="channel-icon channel-icon-aug" aria-hidden="true"&gt;
      &lt;svg viewBox="0 0 24 24"&gt;

    &lt;h3 class="blue"&gt;Augmentation&lt;/h3&gt;
    &lt;p&gt;AI makes workers faster and more productive at existing tasks.&lt;/p&gt;
    &lt;p class="gray"&gt;Example: AI vision flags likely defects, and the inspector decides which parts fail inspection.&lt;/p&gt;
  &lt;/div&gt;
  &lt;div class="card card-top-blue channel-card"&gt;

    &lt;p&gt;AI lowers the skill barrier for tasks previously requiring deep expertise.&lt;/p&gt;

  &lt;/div&gt;
&lt;/div&gt;

# AI Reduces Inequality

&lt;div class="stat-box"&gt;
&lt;div class="big-number"&gt;21%&lt;/div&gt;

# Which Skills Gain and Lose Value?

.gray[Implications for manufacturing workforce strategy]

&lt;div class="skill-row skill-row-red"&gt;
&lt;div class="skill-label"&gt;
&lt;strong&gt;Verbal Skills&lt;/strong&gt;
&lt;span class="loser"&gt;Lose most value&lt;/span&gt;
&lt;/div&gt;
&lt;div class="skill-desc"&gt;Large language models directly substitute for verbal and writing tasks.&lt;/div&gt;
&lt;/div&gt;

&lt;div class="skill-row skill-row-orange"&gt;
&lt;div class="skill-label"&gt;
&lt;strong&gt;Manual / Physical Skills&lt;/strong&gt;
&lt;span class="neutral"&gt;Retain value (for now)&lt;/span&gt;
&lt;/div&gt;
&lt;div class="skill-desc"&gt;Generative AI cannot replicate physical dexterity—but physical AI will erode this advantage over time.&lt;/div&gt;
&lt;/div&gt;

&lt;div class="skill-row skill-row-green"&gt;
&lt;div class="skill-label"&gt;
&lt;strong&gt;Mathematical / Analytical&lt;/strong&gt;
&lt;span class="winner"&gt;Retain highest value&lt;/span&gt;
&lt;/div&gt;
&lt;div class="skill-desc"&gt;Complex quantitative reasoning remains hardest to automate. Workers with these skills see the largest complementarity with AI.&lt;/div&gt;
&lt;/div&gt;

.footnote[.gray[Althoff &amp; Reichardt (2026). Skill values derived from O*NET task-level analysis.]]

---

# Key Takeaways for Manufacturing Leaders

&lt;div class="takeaway-row"&gt;
&lt;div class="num-circle"&gt;1&lt;/div&gt;
&lt;div class="takeaway-content"&gt;
&lt;h3&gt;Generative vs. physical AI have very different effects&lt;/h3&gt;
&lt;p&gt;Don't treat "AI" as monolithic. Generative AI benefits many production workers; adding robotics and autonomous systems reverses the picture for some groups.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class="takeaway-row"&gt;
&lt;div class="num-circle"&gt;2&lt;/div&gt;
&lt;div class="takeaway-content"&gt;
&lt;h3&gt;Simplification is the underappreciated opportunity&lt;/h3&gt;
&lt;p&gt;AI tools that lower skill barriers can upskill your existing workforce rather than requiring new hires. This is where the largest gains to lower-wage workers come from.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;

&lt;div class="takeaway-row"&gt;
&lt;div class="num-circle"&gt;3&lt;/div&gt;
&lt;div class="takeaway-content"&gt;
&lt;h3&gt;With the right strategy, AI can be a leveler—not a divider&lt;/h3&gt;
&lt;p&gt;Our research shows AI reduces inequality on net. But realizing this depends on how firms invest in augmentation and simplification alongside automation.&lt;/p&gt;
&lt;/div&gt;
&lt;/div&gt;

.footnote[.gray[Althoff &amp; Reichardt (2026), "Task-Specific Technical Change and Comparative Advantage"]]
