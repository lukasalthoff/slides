<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lukas Althoff Slides</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f5f7fb;
      --panel: #ffffff;
      --text: #183153;
      --muted: #5f6f86;
      --border: #d6deea;
      --accent: #2d6cdf;
      --accent-soft: #e8f0ff;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: linear-gradient(180deg, #f8fbff 0%, var(--bg) 100%);
      color: var(--text);
    }

    main {
      max-width: 920px;
      margin: 0 auto;
      padding: 56px 24px 72px;
    }

    h1 {
      margin: 0 0 10px;
      font-size: 2.2rem;
      line-height: 1.05;
    }

    .intro {
      max-width: 680px;
      margin: 0 0 32px;
      font-size: 1.05rem;
      line-height: 1.5;
      color: var(--muted);
    }

    .deck-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      gap: 18px;
    }

    .deck-card {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 20px 20px 18px;
      box-shadow: 0 10px 30px rgba(24, 49, 83, 0.06);
    }

    .deck-card h2 {
      margin: 0 0 8px;
      font-size: 1.2rem;
      line-height: 1.2;
    }

    .deck-card p {
      margin: 0 0 14px;
      color: var(--muted);
      line-height: 1.45;
    }

    .deck-link {
      display: inline-block;
      padding: 9px 12px;
      border-radius: 8px;
      background: var(--accent-soft);
      color: var(--accent);
      font-weight: 700;
      text-decoration: none;
    }

    .deck-link:hover {
      background: var(--accent);
      color: #ffffff;
    }
  </style>
</head>
<body>
  <main>
    <h1>Lukas Althoff Slides</h1>
    <p class="intro">
      Public HTML slide decks for talks, presentations, and project summaries.
    </p>

    <section class="deck-grid">
      <article class="deck-card">
        <h2>How AI Reshapes Manufacturing Work</h2>
        <p>World Economic Forum, March 24, 2026.</p>
        <a class="deck-link" href="wef/">Open slides</a>
      </article>
    </section>
  </main>
</body>
</html>
