# Two questions about the AI era

.center-content[
Same two questions as the whole course, applied to one technology:

- Does AI raise the rate of economic progress?

- Who gains and who loses?

This lecture takes both from the perspective of economics.
]

# AI progress is fast and compute-driven &lt;br&gt; .small[&lt;span class="gray"&gt;Ho et al. (2024)&lt;/span&gt;]

.center-content[
- Compute needed to reach a fixed language-model benchmark halves about every 8 months

- That is roughly 2.7x per year from algorithms alone, faster than Moore's law

- Effective compute growth: about two-thirds from more hardware, one-third from better algorithms

- Most algorithmic progress is better use of data, not bigger models
]

# From capability to growth

.center-content[
Solow (1957): about 7/8 of long-run growth in output per worker comes from technical change, not from accumulating capital

Growth is paced by the rate of technical change

The AI question: can AI raise that rate, and by how much?
]

---

# AI as the latest automation &lt;br&gt; .small[&lt;span class="gray"&gt;Aghion, Jones &amp; Jones (2019)&lt;/span&gt;]

.center-content[
- Production is a set of tasks; automation lets capital perform tasks once done by labor

- AI is the newest stage of a 200-year process

- In principle this can produce explosive growth

- In practice the limit is set by the tasks AI cannot do well
]

---

# Baumol's cost disease as a brake &lt;br&gt; .small[&lt;span class="gray"&gt;Aghion, Jones &amp; Jones (2019)&lt;/span&gt;]

.center-content[
- Sectors where AI raises productivity see their prices fall

- They shrink as a share of GDP

- Growth ends up paced by essential tasks that are hard to improve

- Fast progress in some tasks does not guarantee fast aggregate growth
]

---

# Weak links: past automation and future AI &lt;br&gt; .small[&lt;span class="gray"&gt;Jones &amp; Tonetti (2026)&lt;/span&gt;]

.center-content[
- Tasks are complements: output is constrained by the scarcest task

- About 87% of US TFP growth since 1950 came from extending automation to new tasks, not from improving already-automated ones

- AI raises growth only as fast as it removes the remaining weak links

- Implication: broad automation matters more than deep capability in a few tasks
]

# Part 2: Inequality in the AI Era

---

# Three margins of AI inequality

.center-content[
- **Between factors:** how income splits between capital and labor

- **Within capital:** which firms capture the gains, small or large

- **Within labor:** which workers gain, high-skill or low-skill

]

---

# Capital vs. labor income

.center-content[
- Automation lets capital perform tasks once done by workers, which can lower labor's share of income

- With complementary tasks, automation also spreads capital thinly across tasks, holding the capital share down .small[&lt;span class="gray"&gt;(Aghion, Jones &amp; Jones)&lt;/span&gt;]

- The net effect on the labor share is theoretically ambiguous

- Under rapid-AI scenarios, forecasters expect a falling labor share and a rising top wealth share .small[&lt;span class="gray"&gt;(Karger et al.)&lt;/span&gt;]
]

---

# Within capital: scale-biased technical change &lt;br&gt; .small[&lt;span class="gray"&gt;Reichardt (2025)&lt;/span&gt;]

.center-content[
- Skill bias asks who technology favors among workers; scale bias asks who it favors among firms

- A technology is large-scale-biased if it raises the returns to running a large firm

- Top income is mostly business income, so the firm-size distribution drives top inequality

- The question for any new technology: does it raise the returns to scale?
]

---

# Within labor: the skill premium

.center-content[
- Since about 1980, technical change raised demand for skilled workers and widened wage inequality .small[&lt;span class="gray"&gt;(Katz &amp; Murphy 1992)&lt;/span&gt;]

- The college wage premium roughly doubled

- Acemoglu (2002): this skill bias was partly induced by the rising supply of skilled workers, not fixed in the technology

- AI need not continue in the same direction
]

---


# Task-specific technical change &lt;br&gt; .small[&lt;span class="gray"&gt;Althoff &amp; Reichardt (2026)&lt;/span&gt;]

.center-content[
Three channels of AI technical change:

- **Augmentation:** raises worker productivity

- **Automation:** substitutes capital for labor on some tasks

- **Simplification:** lowers the skill a task requires, letting more workers perform it

Simplification is the new force, and it reverses the direction of skill bias.
]

---

# Task-specific technical change: results &lt;br&gt; .small[&lt;span class="gray"&gt;Althoff &amp; Reichardt (2026)&lt;/span&gt;]

.center-content[
- Average wages rise about 28% .small[&lt;span class="gray"&gt;(moderate-AI scenario)&lt;/span&gt;]

- Wage inequality falls (90-10 wage ratio down 24%), driven by simplification

- Math and manual skills hold their value; verbal skills depreciate the most

- Welfare gains (15-45% of lifetime wages) are largest for the lowest-skill workers
]

---

# Unequal AI adoption &lt;br&gt; .small[&lt;span class="gray"&gt;Althoff &amp; Reichardt (2026)&lt;/span&gt;]

.center-content[
- Adoption has been slower among lower-skill workers .small[&lt;span class="gray"&gt;(Humlum &amp; Vestergaard 2025; Bick et al. 2026)&lt;/span&gt;]

- Skill-dependent adoption costs dampen, but don't erase, the equalizing effect: the 90-10 ratio still falls 15% (vs. 24% under full adoption)

- The average wage gain nearly vanishes: +28% becomes +0.3%

- Lowering adoption costs is a key policy lever, especially for lower-skill workers
]

---

# Beyond inequality: other externalities of AI

.center-content[
- **Electricity &amp; grid:** data centers strain local grids and can push up electricity prices

- **Environment:** large water, land, and emissions footprint from the compute buildout

- **Geopolitical risk:** frontier compute and chips concentrate economic and military power

- **Offense-defense balance:** AI lowers the cost of cyber, bio, and disinformation attacks, and defenses may not keep pace

- **Concentration of power:** a few firms and states control the frontier models and infrastructure
]

&lt;div class="timer-quote"&gt;A data center in your town: benefits vs. costs?&lt;/div&gt;
&lt;div class="timer-sep"&gt;&lt;/div&gt;

&lt;div style="text-align: left; max-width: 700px; margin: 0 auto 24px; font-size: 22px; line-height: 1.6;"&gt;
1. &lt;strong&gt;Pairs&lt;/strong&gt; (2 min): Each pair takes a side; one lists the benefits of a local data center, the other the costs.&lt;br&gt;
2. &lt;strong&gt;Debate&lt;/strong&gt; (3 min): Merge into two groups, benefits vs. costs, and argue it out.&lt;br&gt;
&lt;/div&gt;

&lt;div class="timer-countdown" id="timer-5min-datacenter"&gt;05:00&lt;/div&gt;
&lt;div class="timer-controls"&gt;
  &lt;button class="timer-toggle is-play" id="timer-5min-datacenter-toggle" type="button" aria-label="Start timer"&gt;&amp;#9654;&lt;/button&gt;
&lt;/div&gt;

&lt;script&gt;
(function() {
  var totalSeconds = 5 * 60;
  var remaining = totalSeconds;
  var intervalId = null;
  var isRunning = false;
  var display = document.getElementById('timer-5min-datacenter');
  var toggle = document.getElementById('timer-5min-datacenter-toggle');
  var playLabel = '&amp;#9654;';
  var resetLabel = 'reset';
  var buttonState = 'play';

  if (!display || !toggle) {
    return;
  }

  function formatTime(seconds) {
    var minutes = Math.floor(seconds / 60);
    var secs = seconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
  }

  function render() {
    display.textContent = formatTime(remaining);
  }

  function setButtonState(state) {
    buttonState = state;
    toggle.innerHTML = state === 'reset' ? resetLabel : playLabel;
    toggle.setAttribute('aria-label', state === 'reset' ? 'Reset timer' : 'Start timer');
    toggle.classList.toggle('is-reset', state === 'reset');
    toggle.classList.toggle('is-play', state === 'play');
  }

  function stopTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
  }

  function resetTimer() {
    stopTimer();
    remaining = totalSeconds;
    render();
    setButtonState('play');
  }

  function startTimer() {
    if (isRunning) {
      return;
    }
    if (remaining &lt;= 0) {
      remaining = totalSeconds;
    }
    stopTimer();
    isRunning = true;
    setButtonState('reset');
    intervalId = setInterval(function() {
      remaining -= 1;
      if (remaining &lt;= 0) {
        remaining = 0;
        render();
        stopTimer();
        return;
      }
      render();
    }, 1000);
  }

  function hasTimerClass(slide) {
    if (!slide || !slide.properties || !slide.properties.class) {
      return false;
    }
    var classes = slide.properties.class.split(/[,\\s]+/).filter(Boolean);
    return classes.indexOf('timer-5min-datacenter') !== -1;
  }

  toggle.addEventListener('click', function() {
    if (buttonState === 'play') {
      startTimer();
    } else {
      resetTimer();
    }
  });

  if (window.slideshow &amp;&amp; window.slideshow.on) {
    var lastWasTimer = false;

    window.slideshow.on('afterShowSlide', function(slide) {
      var isTimerSlide = hasTimerClass(slide);
      if (isTimerSlide &amp;&amp; !lastWasTimer) {
        resetTimer();
      }
      if (!isTimerSlide &amp;&amp; lastWasTimer) {
        resetTimer();
      }
      lastWasTimer = isTimerSlide;
    });

    if (window.slideshow.getSlides) {
      var slides = window.slideshow.getSlides();
      var index = typeof window.slideshow.getCurrentSlideIndex === 'function'
        ? window.slideshow.getCurrentSlideIndex()
        : null;
      if (index !== null &amp;&amp; slides[index] &amp;&amp; hasTimerClass(slides[index])) {
        lastWasTimer = true;
        resetTimer();
      }
    }
  } else {
    resetTimer();
  }
})();
&lt;/script&gt;
