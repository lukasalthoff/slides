# The Malthusian model: Predictions

.center-content[
The model makes sharp, testable predictions:

- **Living standards stay roughly constant**
- **Higher productivity → more people, not richer people**
  - China in 1000 CE was the most technologically advanced civilization on Earth—gunpowder, the compass, paper money, cast iron, canal locks. Yet GDP per capita (~$600) was no higher than Europe's. It simply had *twice the population*.
- **Catastrophes could *raise* living standards**
  - The Black Death (1347–1351) killed ~40% of Europe's population. Real wages in England *doubled* within a generation (Clark, 2007). Land per worker rose, so the survivors were richer.
]

# Escaping the trap

.center-content[
The Malthusian trap held for **10,000+ years**. Then something changed.

- Around 1800, income per person began to rise—and *kept* rising
- Population grew too, but income grew **faster**
- The hockey stick of progress was born

What broke the trap? That is one of the biggest questions in economics—and a central theme of this course.
]

# Revolution 1: The Neolithic Revolution
.gray[~10,000 BCE]

.center-content[
For 200,000 years, small bands of hunter-gatherers were scattered across the globe — ideas, people, and goods moved slowly, knowledge was oral, and living standards barely changed

Then climate change triggered the first **phase change**

- Increasing seasonal variability forced hunter-gatherers to store food and settle down
- Storage → sedentism → agriculture (Matranga, "The Ant and the Grasshopper")
- Agriculture → surplus → cities → states → writing — and **inequality**
- But growth remained slow (~0.006% per year)
]

---

# Revolution 2: The Intellectual Revolution
.gray[~500 BCE]

.center-content[
Writing, cities, and trade networks created the conditions for a revolution in ideas

- Greek philosophy and democracy, Confucianism, Buddhism, the Hebrew prophets — all emerged roughly simultaneously across unconnected civilizations
- For the first time, humans asked systematic questions about governance, ethics, and the nature of the world
- New institutions: codified law, formal education, organized religion
- But the Malthusian trap still held — most people remained poor
]

---

# Revolution 3: The Industrial Revolution
.gray[~1760 AD]

.center-content[
Ideas began to **flow**: books, newspapers, telegraph, telephone, internet

- Capital and people flowed across borders
- The Industrial Revolution, globalization, the information age
- The hockey-stick growth we saw earlier happened here (growth above 1% per year)
- Humanity finally escaped the Malthusian trap
]

---

# Revolution 4: The Digital/AI Revolution
.gray[Since ~2022]

.center-content[
- AI in your watch, your car, your toaster
- Intelligence becoming ambient and ubiquitous
- Are we one step away from another fundamental transformation?
]

# Progress for whom?

.center-content[
The fruits of progress are not always equally distributed.

- Who builds these technologies? Who benefits from them?
- The same forces that create extraordinary wealth can leave millions behind
- **Progress and inequality are twins born together**—and understanding both is the mission of this course
]

---

# Reversal of fortunes

.center-content[
Before colonialism, some of the **wealthiest regions** in the world were in Asia, Africa, and the Americas

- Acemoglu, Johnson &amp; Robinson (2002): countries that were **rich in 1500 are poor today**, and vice versa
- Colonizers imposed **extractive institutions** in prosperous, densely populated regions—designed to exploit, not to develop
- Meanwhile, **settler colonies** (e.g., US, Australia) received inclusive institutions that fostered long-run growth
- The result: a dramatic **reversal** in the global income distribution over 500 years
]

(function() {
  var totalSeconds = 5 * 60;

    var minutes = Math.floor(seconds / 60);
    var secs = seconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(secs).padStart(2, '0');

  function stopTimer() {
    if (intervalId) {

      intervalId = null;

  function resetTimer() {
    stopTimer();
    remaining = totalSeconds;
    render();

    if (remaining &lt;= 0) {

  if (window.slideshow &amp;&amp; window.slideshow.on) {

      var isTimerSlide = hasTimerClass(slide);

    if (window.slideshow.getSlides) {

      var index = typeof window.slideshow.getCurrentSlideIndex === 'function'

# Progress studies

.center-content[
Progress is **not automatic**. Collison &amp; Cowen (2019) call for a new field dedicated to understanding why progress happens — and how to speed it up.

- Progress has been **uneven**. Some ecosystems generate orders-of-magnitude more progress.
- **Why?** The relevant knowledge is **fragmented** across economics, history, sociology, management, science policy — no field owns the question

Progress studies asks: How should we fund science? Train talent? Design organizations? Structure incentives? The goal is not just to understand — but to **intervene**.
]

# The capstone project

.center-content[
An original research project on **an aspect of progress that fascinates you**

- Each week you produce something that builds toward your final project
- Your capstone should combine:
  - **Quantitative analysis and data**
  - A **qualitative, personal component**
  - **Clear, compelling writing** that a general audience can enjoy
- Your classmates will **peer-grade** each other, so write for a broad audience
]

# What makes a great capstone?

.center-content[
1. Focuses on a very specific, important technology, policy, organization, ...
   - Examples: Microscopes, dating, ...
2. Takes a long-run view on the history and future. of that aspect
   - e.g., How have &lt;b&gt;microscopes' resolutions&lt;/b&gt; evolved and how has that changed their use cases? How has &lt;b&gt;courting/dating&lt;/b&gt; changed over centuries, where do people meet, how does dating differ by class, and what's next?
3. Highlights how progress and **inequality** intersect in this domain
   - e.g., Who has access to breakthrough innovations and what use-cases are they used for? Which groups are struggling to find partners to date; have public spheres been eroded at the cost of dating opportunities?
4. Combines existing evidence with original data (e.g., interviews, web-scraping, archives)
5. Has a **qualitative personal component**
6. Is **well-written/designed** and **interactive** (e.g., interactive html, video, ...)
]

# Inspiration: *Works in Progress* magazine

.center-content.small-text[
Here are some questions the magazine [*Works in Progress*](https://worksinprogress.co) is seeking answers to.

- Why have American electricity prices risen so much?
- Why did the semiconductor fabs leave Silicon Valley?
- The amazing decline of genome sequencing costs—who made it happen?
- The rise of apartment cities: why did apartments dominate in some places but not others?
- Drugs that last for months: how are scientists designing medicines that stay in the body?
- Recursive technological improvements in history: has any technology improved itself?

.source[[Works in Progress](https://worksinprogress.co/issue/how-to-write-for-works-in-progress/)]
]

# Peer grading

.center-content[
Occasionally, you will **review and rank** ~3 of your peers' assignments

- Read their work carefully and provide **constructive written feedback**
- **Rank** the assignments you review from strongest to weakest

Your grade on each assignment reflects **two things**:

1. How your peers **ranked** your work
2. The **quality of feedback** you gave to others

This means writing thoughtful, specific comments matters, both for your peers and for you.
