# Overview

.center-content[
- **Climate and fire shape humanity**
  - Fire → cooking → more energy available for the brain
  - Seasonality enabled farming → surpluses produced civilization and inequality
- **Coal, steam, and the Malthusian escape**
  - Coal lifted the land constraint → sustained growth
  - Stagnant wages (Engels pause), urban air pollution
- **Feeding and powering the modern world**
  - Haber-Bosch → nitrogen for crops
  - Electricity → general-purpose technology; ~700M still lack access
  - AI and data centers → efficiency raises total energy use
- **Humans shape climate**
  - Fossil energy warms the planet
  - Damages concentrate in low-emitting countries
]

## Neanderthals making fire 400,000 years ago
.center-content[
  
&gt; Some 400,000 years ago, in what is now eastern England, a group of Neanderthals used flint and pyrite to make fires by a watering hole — not just once, but time after time, over several generations.

Fire *use* (wildfire) vs. fire *making* (on-demand ignition = general-purpose technology)

1. Same soil patch burned repeatedly
2. No surrounding burn halo — rules out landscape fire
3. Sediment chemistry: sustained high temperatures, hours
4. Pyrite (spark material) transported 40 miles, found with heat-shattered stone — smoking gun


This is one of the few sites known where Neanderthals made fire
]

.footnote[.small[Source: Zimmer, *NYT*, Dec 10 2025, on Ashton et al., *Nature* 2025.]]

# Fire: the first energy transition &lt;br&gt; .small[&lt;span class="gray"&gt;Wrangham (2009)&lt;/span&gt;]

.center-content[
- 400,000 years ago: human ancestors learn to control fire
- Cooking externalizes digestion: softer food, fewer calories burned breaking it down
- Freed calories likely fueled brain expansion (the "expensive tissue hypothesis")
- &lt;span class="gray"&gt;Wrangham (2009), *Catching Fire*:&lt;/span&gt; cooking made us human
- Fire is 1st time humans borrow energy from outside the body to expand capabilities
]

---

# Climate change (vol. 1)

.center-content[
- Climate shifts force humans to change how they live
- Climate: a stable window when the land could be farmed

- Holocene (~12,000 years ago): warmer, more stable, more seasonal climates
- Seasonality → storage → sedentism → farming → surplus → stratification → states
]

# Organic economy and the Malthusian trap &lt;br&gt; .small[&lt;span class="gray"&gt;Wrigley (1988, 2010)&lt;/span&gt;]

.center-content[
- Pre-industrial economies ran on *flows* of solar energy through biomass (food for people and animals, firewood for heat, ...)
- More output required more land, and land was fixed: growth ran into a hard ceiling
- &lt;span class="gray"&gt;Wrigley (2010):&lt;/span&gt; calls this the "organic economy"
- This is the Malthusian trap given a concrete energy interpretation: binding land constraint, stagnant living standards
]

---

# The pre-coal ceiling &lt;br&gt; .small[&lt;span class="gray"&gt;Wrigley (2010); Allen (2009)&lt;/span&gt;]

.center-content[
- By 1600, accessible firewood in England was running out
- Coal substituted first for home heating, then only later for industry
- Coal = "banked sunlight": millions of years of stored solar energy released in a few centuries
- The escape from the organic economy began with this shortage
]

# From heat to mechanical work: the steam engine &lt;br&gt; .small[&lt;span class="gray"&gt;Newcomen, Watt, Mokyr&lt;/span&gt;]

.center-content[
- &lt;span class="gray"&gt;Newcomen (1712):&lt;/span&gt; atmospheric steam engine = first practical pump for flooded mines
- &lt;span class="gray"&gt;Watt (1769):&lt;/span&gt; separate condenser (3–4x fuel efficiency gain)
- Coal becomes *mechanical work*: factories, railways, steamships
- The coal–iron–steam complex remakes what an economy can produce
- &lt;span class="gray"&gt;Mokyr:&lt;/span&gt; scale-up required "useful knowledge" linking why machines worked to how to improve them
]

---


# The Engels pause &lt;br&gt; .small[&lt;span class="gray"&gt;Allen (2009)&lt;/span&gt;]

.center-content[
- From ~1790, output per worker in Britain rises sharply
- But real wages stagnate or fall until ~1840
- Industrial growth and worker welfare decouple for roughly half a century
- The escape from the Malthusian ceiling did not arrive evenly and not for everyone at once
]

# East-Side Story &lt;br&gt; .small[&lt;span class="gray"&gt;Heblich, Trew &amp; Zylberberg (2021)&lt;/span&gt;]

.center-content[
- Prevailing west-to-east winds blew coal smoke east
- Cleaner west sides attracted richer households; poorer households remained in dirtier east-side neighborhoods
- Pollution sorted people within cities, not just across them
- That east-west class geography persisted long after coal smoke ended

# Theory interlude: externalities &lt;br&gt; .small[&lt;span class="gray"&gt;Pigou (1920); Hardin (1968)&lt;/span&gt;]

.center-content[
- When producers ignore **social costs**, private marginal benefit exceeds social marginal benefit
- Output overshoots the social optimum: markets produce too much of the harmful thing
- &lt;span class="gray"&gt;Hardin (1968):&lt;/span&gt; **tragedy of the commons**: shared resources get overused when costs are externalized
- &lt;span class="gray"&gt;Pigou (1920):&lt;/span&gt; tax the externality at its marginal damage to restore efficiency
]

.center-content[

- &lt;span class="gray"&gt;Hanlon, "Coal Smoke, City Growth, and the Costs of the Industrial Revolution":&lt;/span&gt; coal pollution was a measurable drag on city growth

# Jevons' paradox &lt;br&gt; .small[&lt;span class="gray"&gt;Jevons (1865), *The Coal Question*&lt;/span&gt;]

.center-content[
- &lt;span class="gray"&gt;Jevons (1865):&lt;/span&gt; efficiency gains in coal-using machinery raised total coal consumption, not lowered it
- Mechanism: lower per-unit cost → broader adoption → higher total use
- Efficiency rebounds into scale; the aggregate footprint grows even as each unit gets cleaner
- Returns with AI compute in Section 3
]

# 3. Feeding and powering the modern world

---

# Haber-Bosch: breaking the nitrogen constraint &lt;br&gt; .small[&lt;span class="gray"&gt;Haber (1909); Bosch (1913)&lt;/span&gt;]

.center-content[
- Nitrogen is essential for plant growth; before 1910, the only sources were guano, saltpeter, legumes, and recycled manure — all scarce
- &lt;span class="gray"&gt;Haber (1909); Bosch (industrial scale-up, 1913):&lt;/span&gt; synthesize ammonia from atmospheric N₂ and H₂ under high pressure and heat
- The next energy-unlocks entry after coal and steam: fossil energy now feeds crops, not just machines
- Roughly half the nitrogen atoms in the average human body passed through a Haber-Bosch reactor
- &lt;span class="gray"&gt;Aside:&lt;/span&gt; dual-use — the same process also made modern explosives
]

---

# Crop yields and the Green Revolution

.center-content[
&lt;img src="../../graduate/slides/files/crops.png" width="65%" style="display: block; margin: auto;" /&gt;
]

- Dwarf wheat, IR8 rice, and synthetic fertilizer drive yield takeoff from the 1950s
- Billions of people fed who otherwise would not have been

# Inappropriate technology: the distributional rhyme &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2022)&lt;/span&gt;]

.center-content[
&lt;img src="../../graduate/slides/files/crop_diff.png" width="55%" style="display: block; margin: auto;" /&gt;

- &lt;span class="gray"&gt;Directed-technical-change logic:&lt;/span&gt; who benefits depends on where the tech was designed to work — the distributional beat of this section

# Electricity: the second general-purpose technology &lt;br&gt; .small[&lt;span class="gray"&gt;Edison (1880s); Tesla &amp; Westinghouse (1880s–1890s)&lt;/span&gt;]

.center-content[
&lt;img src="../../graduate/slides/files/electric_motor_pictures.jpeg" width="55%" style="display: block; margin: auto;" /&gt;
]

- DC vs. AC and grid economics set the stage; the **electric motor** (1880s–1900s) replaces shaft-and-belt factories
- Machines no longer chained to a single steam source — factory layouts and small-scale industry are reshaped
- Full payoff took ~40 years: GPTs diffuse slowly, through complementary organizational change

# Jevons paradox rides again &lt;br&gt; .small[&lt;span class="gray"&gt;Jevons (1865)&lt;/span&gt;]

.center-content[
- Per-FLOP energy costs have fallen by orders of magnitude
- **Total compute demand is rising faster** — so total energy used by AI goes *up*, not down
- Same mechanism &lt;span class="gray"&gt;Jevons (1865)&lt;/span&gt; identified in coal, playing out in 2026
- A substantial share of the new AI load is being met with natural gas, not renewables (bridges to Section 4)
- &lt;span class="gray"&gt;Efficiency without scarcity raises total use. Jevons' paradox rides again.&lt;/span&gt;
]

# 4. Humans shape climate

---

# The headline estimate &lt;br&gt; .small[&lt;span class="gray"&gt;Bilal &amp; Känzig (QJE 2026)&lt;/span&gt;]

.center-content[
&lt;img src="../../graduate/slides/files/bilal_1.png" width="55%" style="display: block; margin: auto;" /&gt;

- **1°C of global warming → long-run world GDP falls by more than 20%**
- Implied **Social Cost of Carbon above $1,200/ton**
- An **order of magnitude** above Nordhaus-era estimates (~$50–200/ton)
]

---

# Identification: global vs. local temperature &lt;br&gt; .small[&lt;span class="gray"&gt;Bilal &amp; Känzig (2026)&lt;/span&gt;]

.pull-left[
&lt;img src="../../graduate/slides/files/bilal_2.png" width="95%" style="display: block; margin: auto;" /&gt;
]

.pull-right[
- Prior work (&lt;span class="gray"&gt;Deschênes &amp; Greenstone; Hsiang&lt;/span&gt;) identified damages from **local** temperature variation
- Key insight: **global** temperature proxies for the frequency of **extreme weather** (hurricanes, floods, heatwaves); local temperature does not
- Previous estimates therefore **systematically understated** total climate damages
]

&lt;div style="clear: both;"&gt;&lt;/div&gt;

---

# The Pigouvian framing, revisited

.center-content[
- Standard view: climate action is a **collective-action problem**
  - Costs borne **nationally**, benefits leak **globally**
  - Unilateral action looks irrational — free-riding is dominant
- Implication: nothing gets done without a **global treaty** (Kyoto, Paris)
- This section **upends** that view — same Pigouvian framework, sharper damages
]

---

# The Domestic Cost of Carbon &lt;br&gt; .small[&lt;span class="gray"&gt;Bilal &amp; Känzig (2026)&lt;/span&gt;]

.center-content[
- **Domestic SCC**: damages a country bears *itself* from *its own* emissions, once global-temperature transmission of extreme events is priced in
- **US domestic SCC: ~$226/ton**
- **EU domestic SCC: ~$216/ton**
- **Marginal abatement cost: ~$80/ton**
- `\(\Rightarrow\)` **over 80% unilateral decarbonization is efficient** for the US and EU — *before* counting any global co-benefits
- The **free-rider problem dissolves** once damages are measured correctly
]

---

# Aggregate damages hide extreme incidence

.center-content[
*[Placeholder: Climate damages per capita vs. cumulative CO₂ emissions per capita, by country — scatter with hot/poor/equatorial countries in the upper-left, wealthy high-emitters in the lower-right]*

- The "~20% GDP loss per 1°C" aggregate **masks** enormous regional variation
- Damages fall hardest on **hot, poor, equatorial** countries
- These are the countries that have **emitted least**
]

---

# CO₂ footprint per capita across countries

.center-content[
*[Placeholder: World map or scatter of CO₂ emissions per capita by country]*

- US ~**15** tons/person/year &amp;nbsp;&amp;nbsp; EU ~**6** &amp;nbsp;&amp;nbsp; India ~**2** &amp;nbsp;&amp;nbsp; sub-Saharan Africa ~**1**
- High-emitting wealthy nations bear **less** damage
- Low-emitting climate-vulnerable nations bear **more**
- The distributional signature of the climate era, in a single chart
]

# Summary

.center-content[
**1. Climate and fire shape humanity.** Each energy transition, starting with fire, lifted a biological or material constraint — but also reshaped how humans divide the gains.

**2. Coal, steam, and the Malthusian escape.** Coal broke the organic-economy ceiling and launched sustained growth — but real wages stagnated for half a century (Engels pause), smog killed at scale, and Jevons' paradox arrived with it.

**3. Feeding and powering the modern world.** Haber-Bosch, electricity, and AI compute each unlock new capacities — but diffusion is uneven (&lt;span class="gray"&gt;Moscona &amp; Sastry; 700M without electricity&lt;/span&gt;) and Jevons returns through AI demand met partly with natural gas.

**4. Humans shape climate.** &lt;span class="gray"&gt;(Bilal &amp; Känzig 2026)&lt;/span&gt; measured correctly, **over 80% unilateral decarbonization is efficient** — but damages fall hardest on the countries that emitted least.
