# Neanderthals making fire 400,000 years ago
.center-content[


- This is one of the few sites known where Neanderthals made fire
- Fire *use* (wildfire) vs. fire *making* (on-demand ignition = general-purpose technology)
  1. Same soil patch burned repeatedly
  2. Sediment chemistry: sustained high temperatures, hours
  3. No surrounding burn halo (rules out wildfire; there is no such thing as a wildfire that scorches one tight circle of ground while leaving the grass six inches away green and uncharred)
  4. Pyrite (spark material) transported 40 miles, found with heat-shattered stone (smoking gun evidence)


]

.footnote[.small[Source: Zimmer, *NYT*, Dec 10 2025, on Ashton et al., *Nature* 2025.]]

# Fire: the first energy transition &lt;br&gt; .small[&lt;span class="gray"&gt;Wrangham (2009)&lt;/span&gt;]

.center-content[
- 400,000 years ago: human ancestors learn to control fire
- Cooking externalizes digestion: softer food, fewer calories burned breaking it down
- Freed calories likely fueled brain expansion (the "expensive tissue hypothesis")
- &lt;span class="gray"&gt;Wrangham (2009), *Catching Fire*:&lt;/span&gt; cooking made us human
- Fire is 1st time humans borrow energy from outside the body to expand capabilities
]

# Organic economy and the Malthusian trap &lt;br&gt; .small[&lt;span class="gray"&gt;Wrigley (1988, 2010)&lt;/span&gt;]

.center-content[
- Pre-industrial economies ran on *flows* of solar energy through biomass
- More output required more land, and land was fixed → growth ran into a hard ceiling
- &lt;span class="gray"&gt;Wrigley (2010):&lt;/span&gt; calls this the "organic economy"

 = Malthusian trap given a concrete energy interpretation
]

---

# The pre-coal ceiling &lt;br&gt; .small[&lt;span class="gray"&gt;Wrigley (2010); Allen (2009)&lt;/span&gt;]

.center-content[
- By 1600, accessible firewood in England was running out
- Coal substituted first for home heating, then only later for industry
- Coal = "banked sunlight"
- The escape from the organic economy began with this shortage
]

# From heat to mechanical work: the steam engine &lt;br&gt; .small[&lt;span class="gray"&gt;Newcomen, Watt, Mokyr&lt;/span&gt;]

.center-content[
- &lt;span class="gray"&gt;Newcomen (1712):&lt;/span&gt; first practical engine that pumps water out of flooded coal mines
  - Coal powers pumps → deeper mines → more coal
- &lt;span class="gray"&gt;Watt (1769):&lt;/span&gt; a redesign (separate condenser) cuts fuel use 3-4×
  - Engine leaves the mine and runs factories anywhere
- The coal-iron-steam complex (three reinforcing technologies): coal = energy source; iron = structural material (boilers, rails, tools); steam = turns heat into motion
- &lt;span class="gray"&gt;Mokyr:&lt;/span&gt; scaling up required understanding why machines worked, not just how to build them
]

# Theory interlude: externalities &lt;br&gt; .small[&lt;span class="gray"&gt;Pigou (1920); Hardin (1968)&lt;/span&gt;]

.center-content[
- When producers ignore **social costs**, private marginal benefit exceeds social marginal benefit
- Output overshoots the social optimum: markets produce too much of the harmful thing
- &lt;span class="gray"&gt;Hardin (1968):&lt;/span&gt; **tragedy of the commons**: shared resources get overused when costs are externalized
- &lt;span class="gray"&gt;Pigou (1920):&lt;/span&gt; tax the externality at its marginal damage to restore efficiency
]

# East-Side Story &lt;br&gt; .small[&lt;span class="gray"&gt;Heblich, Trew &amp; Zylberberg (2021)&lt;/span&gt;]

.center-content[
- Prevailing west-to-east winds blew coal smoke east
- Cleaner west sides attracted richer households; poorer households remained in dirtier east-side neighborhoods
- Pollution sorted people within cities, not just across them
- That east-west class geography persisted long after coal smoke ended
]

# Jevons' Paradox &lt;br&gt; .small[&lt;span class="gray"&gt;Jevons (1865), *The Coal Question*&lt;/span&gt;]

.center-content[
- Efficiency improvements in use of a resource often increase rather than decrease its total consumption
  - Watt's engine increased coal efficiency by 3-4×
- Making coal-powered work cheaper expands set of activities for which coal is economically viable
  - Cheap steam → factories, mines, ships, and railways all adopted it
- Total demand expansion typically swamps the per-unit savings.
  - Total coal burned rose sharply, even though each engine burned less
]

---

# When does Jevons' Paradox apply?

  &lt;/div&gt;
]

---

# Channels through which Jevons Paradox can apply

.center-content[
- *Direct rebound* (which we just covered)
  - If demand elasticity is greater than 1, total demand will increase
- *Sectoral expansion:* new uses become profitable
  - New applications may become profitable as resource becomes cheaper
  - Depends on whether fixed cost of technology is worth the marginal cost savings
- *General equilibrium:* cheaper energy → cheaper everything
  - Falling cost of resource increases profits and income
  - Increases demand for goods that use the resource
]

# Electricity: the second general-purpose technology &lt;br&gt; .small[&lt;span class="gray"&gt;Reichardt (2025)&lt;/span&gt;]

.center-content[
- 1850-1890: Steam displaces water. Steep scale economies concentrated adoption in large factories and shifted firm sizes upward.
- 1880-1910: Self-generated electricity. Factories ran in-plant dynamos off steam; electric motors replaced line-shaft "group drive" with "unit drive."
- 1910-1930: Purchased electricity dominates. AC transmission and utility regulation enabled centralized generation; fixed costs of power access collapsed and the cost-capacity gradient flattened.
]

# Local vs. global temperature

.center-content[
- "Local" temperature = the temperature *where you live*
  - varies a lot from year to year (hot summer, mild summer)
  - was the basis for most prior damage estimates
- "Global" temperature = the planet's average
  - moves slowly, but a small global change drives a *lot* more extreme weather worldwide
  - hurricanes, floods, heatwaves, droughts all scale with global, not local, temperature
- The two answer different questions
  - *local*: "how does a hot year here hurt this country's GDP?"
  - *global*: "how does the whole climate system warming hurt the world economy?"
]

---


# Identification: global vs. local temperature &lt;br&gt; .small[&lt;span class="gray"&gt;Bilal &amp; Känzig (2026)&lt;/span&gt;]

.pull-left[
&lt;img src="../../graduate/slides/files/bilal_2.png" width="95%" style="display: block; margin: auto;" /&gt;
]

.pull-right[
- Prior work (&lt;span class="gray"&gt;Deschênes &amp; Greenstone; Hsiang&lt;/span&gt;) identified damages from *local* temperature variation
- Key insight: *global* temperature correlates strongly with the frequency of extreme weather; local temperature does not
- Previous estimates therefore systematically understated total climate damages
]

&lt;div style="clear: both;"&gt;&lt;/div&gt;

---

# The Pigouvian framing, revisited

.center-content[
- Standard view: climate action is a *collective-action problem*
  - Costs borne nationally, benefits accrue globally
  - Unilateral action looks irrational, so free-riding is dominant
- Implication: nothing gets done without a global treaty (Kyoto, Paris)
- This section challenges that view: damages large enough to make unilateral action cost-effective
]

---

# The Domestic Cost of Carbon &lt;br&gt; .small[&lt;span class="gray"&gt;Bilal &amp; Känzig (2026)&lt;/span&gt;]

.center-content[
- *Domestic Cost of Carbon (DCC)*: damages a country bears *itself* from *its own* emissions
- Under conventional, local-temperature-based estimates: US DCC ≈ $36/ton (well below the cost of cutting emissions, so unilateral action irrational)
- Once global-temperature transmission of extreme events is priced in: **US DCC ≈ $273/ton**
- Marginal abatement cost: ~$80/ton (&lt;span class="gray"&gt;Bistline et al. 2023&lt;/span&gt;)
  
  `\(\Rightarrow\)` unilateral decarbonization is cost-effective for the US — *before* counting any global co-benefits
- The free-rider problem dissolves once damages are measured correctly
]
