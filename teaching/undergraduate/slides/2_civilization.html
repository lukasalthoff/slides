# Recall: Civilization's major phase changes

.center-content[
Last class we identified **four major civilizational phase changes**:

1. **The Neolithic Revolution** (~10,000 BC)
2. The Intellectual Revolution (~500 BC)
3. The Industrial Revolution (~1760 AD)
4. The Digital/AI Revolution (~now)

Today: **the first phase change**, which built the foundation for modern civilization
]

---

# 200,000 years as grasshoppers

.pull-left[
One of Aesop's (Greek storyteller, 620-564 BC) Fables tells of a grasshopper who eats well in summer and makes music while the weather is warm, but stores nothing for winter

&lt;iframe width="100%" height="200" src="https://www.youtube.com/embed/XPZXpuoIndo?start=136" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen&gt;&lt;/iframe&gt;


]

.pull-right[

  **For 200,000 years, we were the grasshopper**

Hunter-gatherers were highly capable:

- Skilled trackers, sophisticated tool-makers
- Deep knowledge of plants and animals

It wasn't a lack of intelligence. What changed?
]

---

# "Neolithic" = identified by shape of stone tools

.center-content[
Neolithic first identified by a change in the shape of stone tools

.center[**Paleolithic** = "Old Stone"&amp;emsp;&amp;emsp;&amp;emsp;**Neolithic** = "New Stone"]


&lt;img src="../materials/paleo_stone_tool.png" width="30%" style="display: block; margin: auto;" /&gt;
]

---

# But technology is endogenous

.center-content[
Stone tools changed because the need for different tools arose
- **Paleolithic:** Hunter-gatherers subsisting on wild foods: Collecting, processing, consuming
- **Neolithic:** Humans became sedentary, grew their own food

Farming required different instruments for tilling, harvesting, and grinding grain
]

---

# Seasonality and the Invention of Agriculture &lt;br&gt; .small[&lt;span class="gray"&gt;Matranga '24&lt;/span&gt;]

.center-content[
- **Research question:** Why did humans transition from foraging to farming ~12,000 years ago?

- **Key argument:** Increasing climatic seasonality at the end of the last Ice Age made foraging less viable
    - Greater seasonal variation in food availability
    - Adapted by storing food and settling near reliable water sources
    - These behaviors were preconditions for agriculture
]

---

# The Ant and the Grasshopper &lt;br&gt; .small[&lt;span class="gray"&gt;Matranga '24&lt;/span&gt;]

.center-content[
- **Mechanism:** Seasonality forces storage, storage forces sedentism, sedentism enables agriculture

- **Evidence:**
    - Regions with greater increases in seasonality adopted agriculture earlier
    - Archaeological evidence of storage predates evidence of cultivation
    - Sedentary settlements appear before domesticated crops

- **Implication:** Agriculture not a sudden invention but an adaptation to environmental change
]

---

# What changed? Winters got harsher

.center-content[
- Climate seasonality increased: Summers got drier, winters got colder

- Needed to start storing food during good times

- End of nomadic lifestyles. Became sedentary near stored food

- Once sedentary and already storing, planting is the next step
]

.footnote[.small[Source: Matranga, "The Ant and the Grasshopper," *QJE* (2024).]]

---

# The sudden decision to settle down: Seven independent origins

.center-content[
Starting ~12,000 years ago, at least seven different groups independently began to settle down and farm:

- **Fertile Crescent** (~9,500 BC) — wheat, barley, sheep, goats
- **South China** (~7,000 BC) — rice
- **North China** (~6,000 BC) — millet, pigs
- **Mesoamerica** (~3,000 BC) — maize, squash, beans
- **Andes** (~3,000 BC) — potatoes, llamas
- **Sahel** (~3,000 BC) — sorghum, pearl millet
- **Eastern North America** (~2,500 BC) — sunflower, squash

**Puzzle:** How did these groups independently come to the same decision?
]

.footnote[.small[Source: Matranga, "The Ant and the Grasshopper," *QJE* (2024).]]

# After: The demographic explosion

.pull-left[
Sedentism dramatically increased how many children survived

- Nomadic: Can't have more than one young child per parent (someone has to carry them)

- Many childhood diseases survivable if you can stay in one warm place for a few weeks

- Nomadic, breastfeeding women often couldn't reach body fat threshold needed to conceive again for years
]

.pull-right[
Once sedentary, far more kids survive

And even if some groups wanted to remain nomadic:

- Farmers having more children who survive
- If there's ever conflict, farmers win by sheer numbers
]

.footnote[.small[Source: Matranga, in *The Atlantic* (2024).]]

# The data: Climate simulations meet archaeology

.center-content[
- **Climate:** Scientists can simulate what temperatures and rainfall looked like thousands of years ago, for every region on Earth
    - Ice cores trap ancient air bubbles that reveal past CO2 and temperature
    - Ocean sediments and tree rings record precipitation patterns
    - These feed climate models that reconstruct conditions going back 22,000 years

- **Archaeology:** For hundreds of locations, we know roughly when people first started farming
    - Excavated seeds show when cultivated crops replace wild plants
    - Stone tools shift from hunting implements to grinding stones and sickles
    - Carbon dating pins down when these transitions happened

- **Key variable:** How different were summers from winters? (temperature seasonality)

- **The test:** Do places where winters got harsher adopt agriculture earlier?
]

.footnote[.small[Source: Matranga (2024), *QJE*.]]

# Skeletal evidence: Farmers had fewer starvation episodes

.pull-left[
&lt;img src="../materials/matranga5.png" width="95%" style="display: block; margin: auto;" /&gt;
]

.pull-right[
- **Growth-arrest lines** in bones record episodes of severe nutritional stress (seasonal starvation)

- Farmers have *fewer* growth-arrest lines than hunter-gatherers

- Directly supports the seasonality mechanism: Settling down and storing food smoothed out seasonal food shortages

- Trade-off: Farmers were shorter and had more joint diseases — but they no longer starved in winter
]

.footnote[.small[Source: Matranga (2024), *QJE*; Cohen and Armelagos (1984).]]

---

# Archaeological evidence: Storage came BEFORE farming

.pull-left[
**Middle East**

- Became sedentary and built granaries before domesticating any crops
- Height declined upon settling down, even before cereals were common

**Pacific Northwest peoples**

- Lived in permanent villages, stored salmon
- Never adopted agriculture but followed same storage-and-settlement pattern
]

.pull-right[
**Why this matters**

**Alternative story:** People just figured out how to plant things, then storage and sedentism followed as consequences

**Matranga's story:** Climate forced storage and sedentism *first*; farming was the last step

1. Seasonality increases
2. Hunter-gatherers settle down to store food
3. Sedentary life + storage makes farming almost inevitable

Archaeology confirms Matranga: Storage appears *before* farming
]

.footnote[.small[Source: Matranga (2024), *QJE*, Section IV.]]

# Agriculture created surplus, surplus changed everything

.center-content[
For the first time, one farmer could produce more food than their family needed

Surplus enabled:

- **Specialization** — potters, weavers, priests, soldiers
- **Cities** — large permanent settlements
- **Writing** — invented to track grain stores and debts
- **States** — organized taxation and defense
]

---

# Population exploded but living standards didn't

&lt;div style="display: flex; align-items: center; height: 480px; gap: 30px;"&gt;
&lt;div style="flex: 1;"&gt;
&lt;ul&gt;
&lt;li&gt;Agriculture supported far more people per square mile than foraging&lt;/li&gt;
&lt;li&gt;World population: 5 million (10,000 BC) → 250 million (1 AD)&lt;/li&gt;
&lt;li&gt;A 50x increase in 10,000 years&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div style="flex: 1;"&gt;
&lt;ul&gt;
&lt;li&gt;But per-capita income barely changed for thousands of years&lt;/li&gt;
&lt;li&gt;More people, same output per person&lt;/li&gt;
&lt;li&gt;This is the &lt;span style="color:#BF616A; font-weight:bold;"&gt;Malthusian trap&lt;/span&gt;: Every improvement in productivity was absorbed by population growth&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;

---

&lt;div class="quote-box"&gt;
"The domestication of plants and animals... made possible the concentration of food surpluses, and thereby the rise of inequality, servitude, and the state."
&lt;/div&gt;
&lt;div class="quote-source"&gt;
— James C. Scott, "Against the Grain"

# The birth of inequality

&lt;div style="display: flex; align-items: center; height: 480px; gap: 30px;"&gt;
&lt;div style="flex: 1;"&gt;
&lt;p&gt;&lt;b&gt;Hunter-gatherer societies&lt;/b&gt; were broadly egalitarian:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;No permanent property&lt;/li&gt;
&lt;li&gt;No inherited wealth&lt;/li&gt;
&lt;li&gt;Leaders earned authority, didn't inherit it&lt;/li&gt;
&lt;li&gt;Sharing norms enforced equality&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div style="flex: 1;"&gt;
&lt;p&gt;&lt;b&gt;Agricultural societies&lt;/b&gt; created hierarchy:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Surplus could be stored and hoarded&lt;/li&gt;
&lt;li&gt;Land became property&lt;/li&gt;
&lt;li&gt;Elites emerged: Kings, priests, warriors&lt;/li&gt;
&lt;li&gt;First slaves appeared&lt;/li&gt;
&lt;li&gt;Wealth was inherited&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;

# Neolithic revolution and the origin of the state

.center-content[
- Following the Neolithic Revolution, some regions developed complex hierarchies: City-states, great civilizations of antiquity

- How did farming trigger this change?

- Why did some regions remain with only simple hierarchy, despite adopting farming?
]

.footnote[.small[Mayshar, Moav &amp; Pascali, "The Origin of the State," *JPE* (2022).]]

# Existing theory: Surplus leads to hierarchy

.center-content[
&lt;img src="../../graduate/slides/files/existing_theory_diagram.png" width="95%" style="display: block; margin: auto;" /&gt;

"In short, plant and animal domestication meant much more food... The resulting food surpluses ... were a prerequisite for the development of settled, politically centralized, socially stratified, economically complex societies." (Diamond, '97)
]

---

# Critique: Surplus is neither necessary nor sufficient

.center-content[
- **Surplus not necessary** for appropriation
    - Labor and fruits of labor may be stolen by authority even if it leads to death

- **Surplus not sufficient** for appropriation
    - Some crops not suitable for transfer and storage, even if there's surplus
]

---

# New theory: It's not surplus, it's **cereals**

.center-content[
&lt;img src="../../graduate/slides/files/new_theory_diagram.png" width="95%" style="display: block; margin: auto;" /&gt;

- **Appropriability**
    - Encouraged robbery and created demand for protection
    - Facilitated finance of elite and provision of protection
]

---

# Datasets on hierarchy beyond Ethnographic Atlas

.center-content[
- **Ethnographic Atlas** &lt;span class="gray"&gt;(Murdock 1962–1980, Gray 1998)&lt;/span&gt;

- **Hierarchy Index** &lt;span class="gray"&gt;(Borcan et al. '14)&lt;/span&gt;
    - 159 countries, every half century from 0 CE to 2000 CE
    - Government above tribal level? (=1 state; 0.75 chiefdom; 0 no)

- **Cross-sectional archaeological evidence** &lt;span class="gray"&gt;(various sources)&lt;/span&gt;
    - Ancient urban settlements &lt;span class="gray"&gt;(Reba, Reitsma &amp; Seto '16; DeGroff '18)&lt;/span&gt;
    - Archaeological sites &lt;span class="gray"&gt;(Ancientlocations.net, Megalith Portal)&lt;/span&gt;

- **Radiocarbon-dated prehistoric sites** &lt;span class="gray"&gt;(Whitehouse '75)&lt;/span&gt;
    - Most relevant prehistoric and proto-historic sites, carbon-dated
]

# Results: Cereals, not surplus, predict hierarchy

.center-content[
- **Cross-sectional evidence:** Societies whose main crop was cereals developed significantly more hierarchical political structures — land productivity alone does not predict hierarchy

- **Over time:** Regions with a greater advantage of cereals over roots/tubers developed more complex states, tracked across 159 countries from 0 to 2000 CE

- **Columbian Exchange as natural experiment:** After 1500, crop transfers between Old and New Worlds changed which regions could grow cereals — regions that gained cereal advantage also gained hierarchy

- **Key takeaway:** It was not agriculture per se that built states — it was the *type* of crop. Cereals are storable, visible, and confiscatable; roots and tubers are not
]

---

# Critique: Columbian Exchange bundled crops with disease and technology

.center-content[
- **Columbian Exchange** was not just a crop shock — bundled biological and technological transfer between Old and New Worlds &lt;span class="gray"&gt;(Crosby '72)&lt;/span&gt;

- **Disease channel:** Smallpox, measles, influenza caused 50–90% mortality among Indigenous populations, reshaping hierarchies independently of crops &lt;span class="gray"&gt;(Weil '07, '10)&lt;/span&gt;

- **Technology channel:** Europeans brought firearms, horses, steel, writing, bureaucratic institutions — all one-directional (Old to New World) and correlated with the cereal shock

- **Robustness check** drops formal colonies, but disease, technology, and trade extended beyond formal colonial boundaries
]

# Why did Europe pull ahead?

.center-content[
- **Key argument:** Geographic fragmentation shaped political and economic development
    - Europe's fractured geography produced many competing states
    - China's open geography produced a unified empire
    - Competition among European states spurred institutional innovation

- **Evidence:** A computational model calibrated to Eurasia's geography correctly predicts Europe's fragmentation vs. China's unification
]

.footnote[.small[Fernández-Villaverde, Koyama, Lin &amp; Sng, "The Fractured-Land Hypothesis," *QJE* (2023).]]

---

# Do institutions cause economic prosperity?

.center-content[
- **Challenge:** Institutions are endogenous
    - Rich countries may adopt better institutions
    - Omitted variables (geography, culture) may drive both

- **Strategy:** Use colonial history as a natural experiment
    - Where Europeans faced high disease mortality, they set up extractive institutions
    - Where mortality was low, they settled and built inclusive institutions
    - These institutional frameworks persisted long after independence

- **Results:** Institutions have a large causal effect on income; geographic variables lose explanatory power once institutions are accounted for
]

.footnote[.small[Acemoglu, Johnson &amp; Robinson, "The Colonial Origins of Comparative Development," *AER* (2001). Nobel Prize 2024.]]

---

# Critique: Human capital, not institutions

.center-content[
- **Settlers brought human capital** (educated, skilled people), not just institutional blueprints
    - Schooling predicts growth at least as well; settler mortality predicts both institutions *and* human capital

- **Institutional measure is a policy outcome,** not a durable constraint
    - "Protection against expropriation risk" can change overnight with a new dictator
    - Substituting constitutional constraints (executive constraints, judicial independence): Relationship with growth disappears

- **East Asian challenge:** South Korea, Taiwan, Singapore had poor institutional scores in the 1960s, grew fast, *then* improved institutions
]

.footnote[.small[Glaeser, La Porta, Lopez-de-Silanes &amp; Shleifer, "Do Institutions Cause Growth?" *JEG* (2004).]]

---

# Takeaway: Institutions matter for growth

.center-content[
- AJR remains among the most important papers in this literature &lt;span class="gray"&gt;(Nobel '24)&lt;/span&gt;

- Broad conclusion widely accepted: Institutions matter for development

- But identification less airtight than it appeared in 2001
    - Glaeser et al.: Settler mortality predicts human capital just as well as institutions

- Cleanly separating institutions from human capital, geography, and disease remains an open problem
]

---

# Review: From foragers to the modern world

.center-content[
- Climate change made winters harsher, forcing hunter-gatherers to store food and become sedentary
- Sedentism, storage, and farming produced surplus for the first time
- Surplus freed people from food production, enabling specialization, cities, writing, and states
  - But only where surplus was taxable: Cereals are storable, visible, confiscatable; roots and tubers are not. 
  - Where cereals dominated, hierarchy and inequality deepened
- States that competed (fragmented Europe) innovated; unified empires (China) stagnated
- Colonial powers exported their institutions
  - Inclusive institutions where they settled
  - Extractive institutions where they didn't
  - Colonialism created a reversal of fortunes that persists today
]
