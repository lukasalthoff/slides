# Growth (1/2): Diminishing returns mean accumulation alone not enough

.center-content[

Q: Can population or factor growth by itself generate sustained growth in living standards?

A: No. Diminishing returns → expanding one factor can generate transitional but not sustained growth

- &lt;span class="gray"&gt;Malthus (1798):&lt;/span&gt; With land fixed, higher productivity raises wages only temporarily; population growth eventually pushes living standards back down.

- &lt;span class="gray"&gt;Solow (1956):&lt;/span&gt; With diminishing returns to capital, capital accumulation raises income per worker only temporarily; sustained growth requires technological progress.
- &lt;span class="gray"&gt;Solow (1957):&lt;/span&gt; Growth accounting for the US shows that most long-run growth in output per worker reflects TFP growth, not factor accumulation alone.

- &lt;span class="gray"&gt;Mankiw, Romer &amp; Weil (1992):&lt;/span&gt; Adding human capital improves the model's fit to *cross-country* income differences and implies slow convergence (because physical and human capital are complementary, diminishing returns set in more slowly).

]

# Sustained growth requires technology &lt;br&gt; .small[&lt;span class="gray"&gt;Solow (1956, 1957)&lt;/span&gt;]

.center-content[
- Many things raise output per worker temporarily:
  - Physical capital accumulation
  - Human capital accumulation
  - Trade and specialization
  - Institutional improvements

- Without growth in `\(A\)`, long-run growth in output per worker is zero

- In Solow, growth in `\(A\)` is exogenous

- Subsequent growth theory tries to explain where growth in `\(A\)` comes from
]

---

# Growth (2/2): Ideas as the escape from diminishing returns

.center-content[

Q: If accumulation alone cannot sustain growth, what can?

A: The creation and diffusion of ideas. Unlike land or capital, ideas can be used by many people at once.

- &lt;span class="gray"&gt;Romer (1990):&lt;/span&gt; Ideas are non-rival: once discovered, the same idea can raise productivity in many places at once. Producing new ideas can therefore sustain growth by offsetting diminishing returns to factor accumulation alone.

- &lt;span class="gray"&gt;Lucas (1988):&lt;/span&gt; Human-capital spillovers can also offset diminishing returns, especially where skilled workers cluster and learn from one another.

- &lt;span class="gray"&gt;Jones (1995):&lt;/span&gt; But idea production may itself face diminishing returns: new ideas get harder to find. More research effort then raises discovery less than proportionally, so sustaining growth requires a growing research workforce.
]

---

# Ideas are non-rival &lt;br&gt; .small[&lt;span class="gray"&gt;Romer (1990)&lt;/span&gt;]

.center-content[
- Ideas are different from machines, land, or labor: many people can use the same idea at the same time

- A blueprint, production method, or scientific insight can spread without being used up

- Researchers, engineers, and inventors can spend time creating new ideas

- That is why growth can continue through new ideas, not just through adding more workers or machines
]

---

# Ideas are getting harder to find &lt;br&gt; .small[&lt;span class="gray"&gt;Jones (1995)&lt;/span&gt;]

.center-content[
- &lt;span class="gray"&gt;Romer (1990)&lt;/span&gt; implies larger research workforce should lead to faster growth
  - US R&amp;D employment grew 5× from 1950–1990, TFP growth did not accelerate

- &lt;span class="gray"&gt;Jones (1995):&lt;/span&gt; As the stock of knowledge grows, the easy discoveries get used up, so each new idea takes more time and more researchers to find

  - Long-run growth then depends on growth in the research workforce, not just its level

  - Declining population growth could permanently slow growth

- &lt;span class="gray"&gt;Bloom, Jones, and Van Reenen (2020):&lt;/span&gt; Provide evidence that falling research productivity has offset the growing number of researchers
]

# Why did technology generate sustained growth only after 1750?

.center-content[
- Major inventions appeared long before modern growth

- But before 1800, they did not generate sustained growth in income per person

- What was missing was continuous follow-on improvement

- Mokyr's question: when do breakthroughs trigger a self-sustaining stream of incremental innovation?
]

---

# The culture of growth &lt;br&gt; .small[&lt;span class="gray"&gt;Mokyr (2016)&lt;/span&gt;]

.center-content[
- Thinkers such as Bacon and Newton helped shift elite beliefs toward using knowledge to understand and improve nature

- The Republic of Letters (1500–1800): a pan-European network of open publication, criticism, and priority rules that lowered the cost of sharing knowledge

- Political fragmentation limited censorship: a thinker banned in one state could publish in another

- By contrast, China had advanced technology, but greater political unity and a centralized examination system left less room for competing ideas
]

---

# **Propositional** (`\(\Omega\)`) vs. **prescriptive** (`\(\lambda\)`) knowledge &lt;br&gt; .small[&lt;span class="gray"&gt;Mokyr (2002), *Gifts of Athena*&lt;/span&gt;]

.pull-left[
**Propositional (`\(\Omega\)`)**

Why things work: natural laws, theories, regularities

Produced mainly by scientists
]

.pull-right[
**Prescriptive (`\(\lambda\)`)**

How to do things: recipes, techniques, designs

Produced mainly by engineers and artisans
]

&lt;div style="clear: both;"&gt;&lt;/div&gt;

Before the Enlightenment, `\(\lambda\)` rested on a narrow epistemic base (understanding of why methods worked): artisans often knew that a method worked, but not why.

---

# The Industrial Enlightenment: `\(\Omega \leftrightarrow \lambda\)` feedback &lt;br&gt; .small[&lt;span class="gray"&gt;Mokyr (2002, 2009)&lt;/span&gt;]

.center-content[
- 1660–1800, Europe linked propositional knowledge (`\(\Omega\)`) and prescriptive knowledge (`\(\lambda\)`) more tightly
  - This was a precondition for the Industrial Revolution, not the Industrial Revolution itself

- More `\(\Omega\)` improved `\(\lambda\)`: theory helped artisans diagnose problems and target improvements
  - Skilled artisans turned ideas into working machines &lt;span class="gray"&gt;(Meisenzahl &amp; Mokyr 2012)&lt;/span&gt;

- Better `\(\lambda\)` improved `\(\Omega\)`: practitioners generated results that refined theory
  - Scientific societies, journals, and lectures linked natural philosophy to practical problems

- Improvement became cumulative rather than one-off
]

---

# **Macroinventions** vs. **microinventions** &lt;br&gt; .small[&lt;span class="gray"&gt;Mokyr (1990), *Lever of Riches*&lt;/span&gt;]

.pull-left[
**Macroinventions**

Radical breakthroughs: steam engine, printing press, integrated circuit

One-off, hard to predict, disruptive
]

.pull-right[
**Microinventions**

Incremental refinements: thousands of small improvements to the steam engine, 1769–1900

Turns a breakthrough into sustained growth
]

&lt;div style="clear: both;"&gt;&lt;/div&gt;

Sustained growth requires a feedback loop between the two. Before 1800, the stream of microinventions was thin and self-limiting because the foundations for systematic improvement were missing.

---

# Other explanations for Britain's takeoff

.center-content[
- *High wages.* Made labor-saving mechanization profitable &lt;span class="gray"&gt;(Allen 2009)&lt;/span&gt;

- *Institutions and state capacity.* Property rights, patents, Parliament, and a capable fiscal state supported investment and experimentation &lt;span class="gray"&gt;(North &amp; Weingast 1989; Brewer 1989)&lt;/span&gt;

- *Coal, empire, and global markets.* Coal eased energy constraints, while empire and trade provided raw materials and demand &lt;span class="gray"&gt;(Wrigley 2010; Pomeranz 2000)&lt;/span&gt;

- *Slavery and colonial wealth.* Profits and wealth tied to slavery may have accelerated British industrialization &lt;span class="gray"&gt;(Williams 1944; Heblich, Redding &amp; Voth 2022)&lt;/span&gt;

- *Agriculture and structural change.* Higher farm productivity released labor and supported urbanization and industrial demand &lt;span class="gray"&gt;(Overton 1996)&lt;/span&gt;

These are usually best seen as complements to Mokyr, not strict alternatives.
]

# How did sustained growth spread beyond Britain? &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász, Sakabe &amp; Weinstein (2025)&lt;/span&gt;]

.center-content[
- Codifying technical knowledge in local languages lowered the cost of adopting British industrial technology

- Japan's industrial takeoff in the 1880s–1890s coincided with a state-led effort to translate and codify Western technical knowledge into Japanese

- Industries more exposed to codified British industrial knowledge grew faster in Japan, but not in most of the periphery

- Cultural transmission mattered too: Meiji Japan also imported ideals of "civilization and enlightenment," not just technical manuals &lt;span class="gray"&gt;(Ghadimi 2024)&lt;/span&gt;

Diffusion required not just trade or imported machines, but readable, teachable knowledge and a broader culture of useful knowledge.
]

# Social Infrastructure as the Fundamental Cause &lt;br&gt; .small[&lt;span class="gray"&gt;Hall &amp; Jones (1999)&lt;/span&gt;]

.center-content[
- Levels accounting: the productivity residual explains much more of income gaps than capital or schooling
    - Richest vs. poorest: capital contributes 1.8x, human capital 2.2x, productivity 8.3x

- That residual is productivity, not social infrastructure

- Hall and Jones argue that social infrastructure is the fundamental cause
    - Institutions and policies shape incentives for production rather than extraction
]

---

# Identification, results, and caveats &lt;br&gt; .small[&lt;span class="gray"&gt;Hall &amp; Jones (1999)&lt;/span&gt;]

.center-content[
- Social infrastructure is measured with anti-diversion policies and openness to trade
    - Low extraction: law and order, low corruption, low expropriation risk

- They instrument with distance from the equator, predicted trade share, and the share speaking English or another European language
    - Logic: Western European influence spread production-friendly institutions

- Main result: countries with better social infrastructure have much higher output per worker

- Main caveat: language shares are themselves outcomes of colonization and settlement
    - The same forces that shaped settlement could also affect income directly

- This motivates &lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson (2001)&lt;/span&gt;: use settler mortality rather than language as the instrument
]

---

# The Colonial Origins of Comparative Development &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson (2001)&lt;/span&gt;]

.center-content[
- Question: do institutions cause prosperity?

- Problem: institutions are endogenous
    - Rich countries may choose better institutions
    - Geography or culture may affect both institutions and income

- Strategy: use colonial history to isolate institutional variation
    - A sharper version of the Hall-Jones argument
]

---

# Settler Mortality as an Instrument &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson (2001)&lt;/span&gt;]

.center-content[
- Core idea: settler mortality affected settlement, settlement affected institutions, and institutions persisted

- Two types of colonies:
    1. Settler colonies (low mortality): Replicated European institutions (property rights, checks on government)
    2. Extractive colonies (high mortality): Set up extractive institutions (forced labor, expropriation)

- Exclusion restriction: settler mortality affects income only through institutions
    - Main threats: persistent disease, selection, population composition
]

---

# Results: Institutions have a large causal effect on income &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson (2001)&lt;/span&gt;]

.center-content[
- First stage: higher settler mortality predicts weaker institutions today
    - In particular, less protection against expropriation

- Second stage: institutions have a large causal effect on income

- The result survives controls for geography, religion, and colonizer

- Once institutions are instrumented, geography explains much less
]

---

# Critique and reply: Settler mortality data &lt;br&gt; .small[&lt;span class="gray"&gt;Albouy (2012); Acemoglu, Johnson &amp; Robinson (2012)&lt;/span&gt;]

.center-content[
- Only 28 of 64 countries have mortality data from settlers or soldiers in that colony

- The other 36 are imputed from nearby countries, other periods, or brief campaigns
    - Many African observations come from short expeditions, not long-run settler conditions

- Albouy argues that dropping the weakest observations weakens the first stage and makes IV estimates fragile

- AJR reply: Albouy drops too much of Latin America and Africa, miscoded a campaign dummy, and overstates the role of outliers

- The dispute has not been fully resolved because the mortality series is still thin and heterogeneous for much of the sample
]

---

# Critique: Human capital, not institutions &lt;br&gt; .small[&lt;span class="gray"&gt;Glaeser, La Porta, Lopez-de-Silanes &amp; Shleifer (2004)&lt;/span&gt;]

.center-content[
- Settlers may have brought human capital, not just institutional blueprints
    - Settler mortality predicts schooling as well as institutions

- The institutional measure is a policy outcome, not a durable constraint
    - Expropriation risk can change quickly
    - Using constitutional constraints weakens the result

- East Asia is a challenge: South Korea, Taiwan, and Singapore grew before their institutional scores improved
]

---

# Takeaway: Institutions matter for growth

.center-content[
- AJR remains among the most important papers in this literature &lt;span class="gray"&gt;Nobel (2024)&lt;/span&gt;

- Broad conclusion: institutions matter for development

- But identification is less airtight than it seemed in 2001
    - &lt;span class="gray"&gt;Albouy (2012):&lt;/span&gt; Mortality data unreliable for over half the sample
    - &lt;span class="gray"&gt;Glaeser et al. (2004):&lt;/span&gt; Settler mortality predicts human capital just as well

- Separating institutions from human capital, geography, and disease remains difficult
]

# Motivation &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]

.center-content[
- Policy question: can concentrated government R&amp;D investment create lasting growth?

- Innovation is non-rival in principle, but in practice it remains geographically clustered

- WWII created the largest R&amp;D shock in US history up to that point

- Decades later, more exposed clusters had about 30% more patents

- The mechanism is agglomeration, not continued government funding
]

---

# WWII and the rise of US public R&amp;D &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
.center-content[
- Before 1940, the federal government did little R&amp;D outside agriculture

- 1940-45: the Office of Scientific Research and Development (OSRD) signed more than 2,250 R&amp;D contracts with firms and universities

- OSRD spent about $9 billion in today's prices and backed about 1 in 8 US patents at the wartime peak

- Did this temporary shock reshape the U.S. innovation system?
]

---

# WWII and the rise of US public R&amp;D &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
.center-content[
&lt;img src="../../graduate/slides/files/wwii_seachange.png" width="51%" style="display: block; margin: auto;" /&gt;
]

# Data and empirical strategy &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
.center-content[
- Digitized the full archive of OSRD contracts, inventions, and patents

- Linked to U.S. patent data (1920-1979), County Business Patterns (CBP), Dun &amp; Bradstreet (D&amp;B), and National Science Foundation records

- Empirical unit: county `\(\times\)` technology field

- Compare patenting in more- and less-exposed clusters before and after WWII

`$$\log(\text{Patents})_{ict} = \sum_t \beta_t \cdot \log(\text{OSRD Rate})_{ic} \cdot \text{Year}_t + \alpha_{ic} + \delta_t + \varepsilon_{ict}$$`

- `\(i\)`: county, `\(c\)`: patent category, `\(t\)`: year

- OSRD rate: the 1941-48 share of patents in a county-technology cluster that were funded by OSRD
]

# Identification Concerns &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
.center-content[
- Funding choices may be endogenous
    - Response: treated and untreated clusters had different levels but not trends before the war
    - Response: OSRD prioritized wartime military needs, not postwar commercial potential

- Other wartime shocks could still matter
    - Response: they compare high- and low-OSRD technologies within the same county
    - Response: controls for postwar government R&amp;D do not remove the effect

- Spillovers mean the estimates are not purely isolated treatment effects
    - Response: cross-technology effects are strongest in related fields and fade with technological distance
]

---

# Effects concentrated in existing clusters &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
&lt;img src="../../graduate/slides/files/effects_osrd_patenting2.png" width="85%" style="display: block; margin: auto;" /&gt;

- Effects are concentrated in counties that were already highly inventive before WWII

- OSRD amplified existing clusters more than it created new ones

# What we learn &lt;br&gt; .small[&lt;span class="gray"&gt;Gross &amp; Sampat (2023)&lt;/span&gt;]
.center-content[
- A temporary R&amp;D shock can have long-run effects

- The effect mainly amplified places that were already inventive

- The mechanism was agglomeration: denser local sharing, matching, and learning
]


---


# Critique of patents as a proxy for innovation

.center-content[
- Patents are detailed and widely available across time and space

- But they are an imperfect measure of innovation

- Many inventions are never patented, and many patents are never economically important
    - Fewer than half of inventions are patented; many patents lapse early

- Patenting behavior varies across industries, firms, legal regimes, and countries

- Patent counts and productivity are often weakly correlated in the short run &lt;span class="gray"&gt;(Ribeiro 2025)&lt;/span&gt;

- Better measures focus on higher-value or more novel patents
    - Triadic patents: the same invention filed at the USPTO, EPO, and JPO &lt;span class="gray"&gt;(OECD 2009)&lt;/span&gt;
    - Citation-weighted patents &lt;span class="gray"&gt;(Hall, Jaffe &amp; Trajtenberg 2005)&lt;/span&gt;
    - New technical terms in patent text &lt;span class="gray"&gt;(Kalyani 2024)&lt;/span&gt;
    - Stock-market responses to patent news &lt;span class="gray"&gt;(Kogan et al. 2017)&lt;/span&gt;

- Even so, patent-based and non-patent-based studies often reach similar broad conclusions

.footnote[.small[Source: [Matt Clancy's "What's New Under the Sun"](https://www.newthingsunderthesun.com/pub/6skgk0ij/release/2)]]
]


---

# Summary

.center-content[
**1. How do economies grow?** Accumulation raises income levels, but only technological change sustains long-run growth; ideas offset diminishing returns, though they may become harder to find. &lt;span class="gray"&gt;(Solow 1956, 1957; Romer 1990; Jones 1995)&lt;/span&gt;

**2. Why did sustained growth take so long?** Growth became self-sustaining when scientific and practical knowledge reinforced each other, turning breakthroughs into continuous improvement; codification later helped this spread beyond Britain. &lt;span class="gray"&gt;(Mokyr 2002, 2009, 2016; Juhász, Sakabe &amp; Weinstein 2025)&lt;/span&gt;

**3. Why do some countries remain richer?** Persistent income gaps likely reflect differences in institutions and social infrastructure, but separating those effects from geography, disease, colonization, and human capital remains difficult. &lt;span class="gray"&gt;(Hall &amp; Jones 1999; Acemoglu, Johnson &amp; Robinson 2001; Albouy 2012; Glaeser et al. 2004)&lt;/span&gt;

**4. Can government policy fuel growth?** A large temporary R&amp;D push can strengthen existing innovation clusters through agglomeration, but it is harder to build new clusters from scratch. &lt;span class="gray"&gt;(Gross &amp; Sampat 2023)&lt;/span&gt;
]

&lt;p style="font-size: 28px; font-weight: bold; margin-bottom: 20px;"&gt;Discussion: AI in Mokyr's framework&lt;/p&gt;

Mokyr argues that growth became self-sustaining when propositional knowledge (why things work) and prescriptive knowledge (how to do things) became easier to connect.

How does AI fit into that framework?

If large language models lower the cost of accessing and translating knowledge, use Mokyr's theory to think through what AI should change in the economy.

&lt;script&gt;
(function() {
  var totalSeconds = 10 * 60;
  var remaining = totalSeconds;
  var intervalId = null;
  var isRunning = false;
  var display = document.getElementById('timer-10min-ai-mokyr');
  var toggle = document.getElementById('timer-10min-ai-mokyr-toggle');
  var playLabel = '&amp;#9654;';
  var resetLabel = 'reset';

  if (!display || !toggle) {
    return;
  }

  function formatTime(seconds) {
    var minutes = Math.floor(seconds / 60);
    var secs = seconds % 60;
    return String(minutes).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
  }

  function render() {
    display.textContent = formatTime(remaining);
  }

  function setButtonState(state) {
    toggle.innerHTML = state === 'reset' ? resetLabel : playLabel;
    toggle.setAttribute('aria-label', state === 'reset' ? 'Reset timer' : 'Start timer');
    toggle.classList.toggle('is-reset', state === 'reset');
    toggle.classList.toggle('is-play', state === 'play');
  }

  function stopTimer() {
    if (intervalId) {
      clearInterval(intervalId);
      intervalId = null;
    }
    isRunning = false;
  }

  function resetTimer() {
    stopTimer();
    remaining = totalSeconds;
    render();
    setButtonState('play');
  }

  function startTimer() {
    if (isRunning) {
      return;
    }
    if (remaining &lt;= 0) {
      remaining = totalSeconds;
    }
    isRunning = true;
    setButtonState('reset');
    intervalId = setInterval(function() {
      remaining -= 1;
      if (remaining &lt;= 0) {
        remaining = 0;
        render();
        stopTimer();
        setButtonState('reset');
        return;
      }
      render();
    }, 1000);
  }

  toggle.addEventListener('click', function() {
    if (!isRunning &amp;&amp; remaining === totalSeconds) {
      startTimer();
    } else {
      resetTimer();
    }
  });

  render();
  setButtonState('play');
})();
&lt;/script&gt;
