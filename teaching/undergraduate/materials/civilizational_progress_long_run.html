<style>
.cp-btn {
  font-size:16px; padding:8px 18px; border-radius:6px;
  border:1.5px solid #1A3A68; background:transparent; color:#1A3A68;
  cursor:pointer; transition:all 0.2s; font-weight:500;
}
.cp-btn:hover { background:#1A3A68; color:#fff; }
.cp-btn.active { background:#1A3A68; color:#fff; }
</style>
<div style="padding: 2rem 0 0.5rem 0;">
<div style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 12px;">
<button id="btn-pop" class="cp-btn active" onclick="setMetric('pop')">World population</button>
<button id="btn-gdp" class="cp-btn" onclick="setMetric('gdp')">GDP per capita</button>
<button id="btn-life" class="cp-btn" onclick="setMetric('life')">Life expectancy</button>
<button id="btn-urban" class="cp-btn" onclick="setMetric('urban')">Urbanization</button>
<button id="btn-lit" class="cp-btn" onclick="setMetric('lit')">Literacy</button>
</div>
<div style="display:flex;align-items:center;gap:8px;margin-bottom:8px;">
<label style="display:flex;align-items:center;gap:6px;font-size:15px;color:#555;cursor:pointer;user-select:none;">
<input type="checkbox" id="log-toggle" onchange="toggleLog()" style="cursor:pointer;"> Log scale
</label>
<span id="metric-note" style="font-size:14px;color:#888;margin-left:auto;"></span>
</div>
<div style="position:relative;width:100%;height:320px;">
<canvas id="mainChart"></canvas>
</div>
</div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
const NAVY='#1A3A68';
const years=[-10000,-5000,-3000,-1000,-500,1,500,1000,1200,1500,1600,1700,1750,1820,1870,1900,1950,1970,2000,2024];

const data={
gdp:{values:[400,430,500,550,580,600,550,600,650,700,750,800,850,1100,1500,2000,3500,5500,8500,15000],label:'GDP per capita (1990 int. $)',note:'Based on Maddison Project estimates, world average'},
pop:{values:[0.005,0.015,0.03,0.05,0.1,0.3,0.2,0.31,0.39,0.5,0.56,0.6,0.72,1.0,1.3,1.65,2.5,3.7,6.1,8.1],label:'World population (billions)',note:'UN and historical demographic estimates'},
life:{values:[25,26,27,28,28,28,27,28,28,30,30,32,34,33,35,40,52,60,67,73],label:'Life expectancy at birth (years)',note:'Global average, Riley/Roser estimates'},
urban:{values:[0,0,2,3,4,5,4,3,4,5,6,8,9,7,14,16,30,37,47,57],label:'Urbanization rate (%)',note:'Share of population in settlements >5,000'},
lit:{values:[0,0,0.5,1,2,5,5,8,10,12,15,20,22,20,25,30,55,65,82,87],label:'Literacy rate (%)',note:'Share of adults with basic reading ability, OWiD/van Zanden'}
};

let current='pop';
let logScale=false;
let chart;

function fmtYear(y){
  if(y<0){const a=Math.abs(y);return (a>=1000?a.toLocaleString():String(a))+' BCE';}
  if(y===0)return '1 CE';
  return String(y);
}

function makeChart(){
  const d=data[current];
  const ctx=document.getElementById('mainChart').getContext('2d');
  if(chart)chart.destroy();
  const grad=ctx.createLinearGradient(0,0,0,320);
  grad.addColorStop(0,NAVY+'30');
  grad.addColorStop(1,NAVY+'05');

  const points=years.map((yr,i)=>({x:yr,y:d.values[i]}));

  chart=new Chart(ctx,{
    type:'line',
    data:{datasets:[{data:points,borderColor:NAVY,backgroundColor:grad,borderWidth:2.5,pointRadius:3,pointBackgroundColor:NAVY,pointBorderColor:'#fff',pointBorderWidth:1.5,pointHoverRadius:6,fill:true,tension:0.3}]},
    options:{
      responsive:true,maintainAspectRatio:false,
      plugins:{
        legend:{display:false},
        tooltip:{
          backgroundColor:NAVY,titleFont:{size:15},bodyFont:{size:15},padding:10,cornerRadius:8,
          callbacks:{
            title:function(items){return fmtYear(items[0].parsed.x);},
            label:function(item){
              let v=item.parsed.y;
              if(current==='pop')return (v<1?Math.round(v*1000)+' million':v.toFixed(1)+' billion');
              if(current==='gdp')return '$'+v.toLocaleString();
              return Math.round(v)+(current==='urban'||current==='lit'?'%':' years');
            }
          }
        }
      },
      scales:{
        x:{
          type:'linear',
          min:-10000,max:2024,
          grid:{display:false},
          ticks:{
            font:{size:14},color:'#555',
            stepSize:2000,
            callback:function(v){return fmtYear(v);}
          }
        },
        y:{type:logScale?'logarithmic':'linear',grid:{display:false},ticks:{font:{size:16},color:'#555',callback:function(v){
          if(current==='pop')return v<1?(v*1000)+'M':v+'B';
          if(current==='gdp')return '$'+v.toLocaleString();
          return v+(current==='urban'||current==='lit'?'%':'');
        }},title:{display:true,text:d.label,font:{size:17},color:'#555'}}
      },
      animation:{duration:600,easing:'easeOutQuart'}
    }
  });
  document.getElementById('metric-note').textContent=d.note;
}

function setMetric(m){
  current=m;
  ['pop','gdp','life','urban','lit'].forEach(k=>{
    document.getElementById('btn-'+k).classList.toggle('active',k===m);
  });
  makeChart();
}

function toggleLog(){
  logScale=document.getElementById('log-toggle').checked;
  makeChart();
}

makeChart();
</script>
