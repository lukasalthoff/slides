
<style>
  .tabs { display:flex; gap:10px; margin-bottom:14px; flex-wrap:wrap; }
  .tab {
    flex:1; min-width:140px; padding:8px 14px;
    background:transparent;
    border:1px solid #1A3A68;
    border-radius:3px;
    cursor:pointer; transition:background-color .2s, color .2s;
    text-decoration:none;
    text-align:center;
  }
  .tab.on { background-color:#1A3A68; }
  .tab:hover { background-color:#1A3A68; }
  .tab.on .tab-title { color:#ffffff; }
  .tab:hover .tab-title { color:#ffffff; }
  .tab-title { font-size:14px; font-weight:500; color:#1A3A68; }
  .detail { background:#F5F7FA; border-radius:6px; padding:24px; min-height:350px; display:flex; align-items:center; justify-content:center; }
  @keyframes wobble { to { stroke-dashoffset:-20; } }
  @media(prefers-reduced-motion:reduce){ .wob { animation:none; } }
</style>

<div class="tabs">
  <div class="tab on" id="t-ecc" onclick="show('ecc')">
    <div class="tab-title">Eccentricity</div>
  </div>
  <div class="tab" id="t-obl" onclick="show('obl')">
    <div class="tab-title">Obliquity</div>
  </div>
  <div class="tab" id="t-pre" onclick="show('pre')">
    <div class="tab-title">Precession</div>
  </div>
</div>

<div class="detail" id="detail"></div>

<script>
const txt2 = '#374151';
const txt3 = '#6B7280';

const svgs = {};

svgs.ecc = `<svg width="100%" viewBox="0 0 580 230" style="max-width:720px">
<defs><marker id="ar" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse"><path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></marker></defs>
<text style="font-family:var(--font-sans);font-size:20px;font-weight:500;fill:${txt2}" x="138" y="18" text-anchor="middle">Low eccentricity</text>
<ellipse cx="138" cy="108" rx="95" ry="80" fill="none" stroke="${txt3}" stroke-width="0.8"/>
<circle cx="138" cy="108" r="10" fill="#EF9F27"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt3}" x="138" y="140" text-anchor="middle">Sun</text>
<g transform="translate(138,108)"><g><animateMotion dur="8s" repeatCount="indefinite" path="M95,0 A95,80 0 1,0 -95,0 A95,80 0 1,0 95,0" /><circle r="5" fill="#85B7EB"/><text style="font-family:var(--font-sans);font-size:14px;fill:${txt3}" x="0" y="-10" text-anchor="middle">Earth</text></g></g>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="138" y="218" text-anchor="middle">Nearly circular — mild seasons</text>

<text style="font-family:var(--font-sans);font-size:20px;font-weight:500;fill:${txt2}" x="430" y="18" text-anchor="middle">High eccentricity</text>
<ellipse cx="430" cy="108" rx="120" ry="65" fill="none" stroke="#EF9F27" stroke-width="1.2"/>
<circle cx="430" cy="108" r="10" fill="#EF9F27"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt3}" x="430" y="140" text-anchor="middle">Sun</text>
<g transform="translate(430,108)"><g><animateMotion dur="8s" repeatCount="indefinite" path="M120,0 A120,65 0 1,0 -120,0 A120,65 0 1,0 120,0" /><circle r="5" fill="#85B7EB"/><text style="font-family:var(--font-sans);font-size:14px;fill:${txt3}" x="0" y="-10" text-anchor="middle">Earth</text></g></g>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="430" y="218" text-anchor="middle">Elliptical — amplifies seasons</text>
</svg>`;

svgs.obl = `<svg width="100%" viewBox="0 0 580 210" style="max-width:720px">
<text style="font-family:var(--font-sans);font-size:20px;font-weight:500;fill:${txt2}" x="145" y="18" text-anchor="middle">Low tilt</text>
<circle cx="145" cy="115" r="55" fill="none" stroke="#1D9E75" stroke-width="1"/>
<line x1="145" y1="30" x2="145" y2="200" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="137" y1="52" x2="153" y2="178" stroke="#1D9E75" stroke-width="2" stroke-linecap="round"/>
<circle cx="137" cy="52" r="3.5" fill="#1D9E75"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:#0F6E56" x="122" y="48">N</text>
<line x1="76" y1="115" x2="214" y2="115" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="3 3"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="145" y="206" text-anchor="middle">Poles get less direct sunlight</text>

<text style="font-family:var(--font-sans);font-size:20px;font-weight:500;fill:${txt2}" x="430" y="18" text-anchor="middle">High tilt</text>
<circle cx="430" cy="115" r="55" fill="none" stroke="#1D9E75" stroke-width="1"/>
<line x1="430" y1="30" x2="430" y2="200" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="3 3"/>
<line x1="414" y1="48" x2="446" y2="182" stroke="#1D9E75" stroke-width="2.5" stroke-linecap="round"/>
<circle cx="414" cy="48" r="4" fill="#1D9E75"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:#0F6E56" x="398" y="44">N</text>
<line x1="361" y1="115" x2="499" y2="115" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="3 3"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt3}" x="507" y="119" text-anchor="start">equator</text>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="430" y="206" text-anchor="middle">More extreme summers and winters</text>
</svg>`;

svgs.pre = `<svg width="100%" viewBox="0 0 580 220" style="max-width:720px">
<text style="font-family:var(--font-sans);font-size:20px;font-weight:500;fill:${txt2}" x="220" y="18" text-anchor="middle">Axial precession</text>
<circle cx="220" cy="140" r="56" fill="none" stroke="#378ADD" stroke-width="1"/>
<ellipse cx="220" cy="54" rx="28" ry="9" fill="none" stroke="#378ADD" stroke-width="0.8" stroke-dasharray="4 4" style="animation:wobble 4s linear infinite"/>
<line x1="210" y1="46" x2="230" y2="196" stroke="#378ADD" stroke-width="2" stroke-linecap="round"/>
<circle cx="210" cy="46" r="4" fill="#378ADD"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:#185FA5" x="194" y="42">N</text>
<line x1="238" y1="50" x2="202" y2="196" stroke="#378ADD" stroke-width="1" stroke-linecap="round" opacity="0.2"/>
<circle cx="238" cy="50" r="2.5" fill="#378ADD" opacity="0.25"/>
<line x1="152" y1="140" x2="288" y2="140" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="3 3"/>

<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="52" text-anchor="start">Earth's axis wobbles like a top</text>
<line x1="248" y1="54" x2="335" y2="54" stroke="${txt3}" stroke-width="0.5" stroke-dasharray="2 3"/>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="96" text-anchor="start">This changes which hemisphere</text>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="116" text-anchor="start">is tilted toward the Sun in summer</text>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="160" text-anchor="start">~12,000 years ago, this made</text>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="180" text-anchor="start">northern summers hotter and</text>
<text style="font-family:var(--font-sans);font-size:17px;fill:${txt2}" x="340" y="200" text-anchor="start">winters colder</text>
</svg>`;

const det = document.getElementById('detail');
det.innerHTML = svgs.ecc;

function show(id) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('on'));
  document.getElementById('t-'+id).classList.add('on');
  det.innerHTML = svgs[id];
}
</script>
