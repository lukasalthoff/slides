# The Solow paradox

.center-content[
- In 1987, Solow quipped:

  &gt; "You can see the computer age everywhere but in the productivity statistics."

- Computers had been commercial for over two decades, yet productivity growth was *slowing*

- Explanations:
  1. Productivity increases may be difficult to measure
  2. For gains to materialize, new technologies may require
      - Human capital investments
      - Organizational adaptation 
  3. Technologies may diffuse slowly
]

---

# Productivity J-curve &lt;br&gt; .small[&lt;span class="gray"&gt;Brynjolfsson, Rock &amp; Syverson (2021)&lt;/span&gt;]

.center-content[
- GPT adopters invest in unmeasured *intangible capital* — reorganizing processes, retraining workers, building complementary systems

- National accounts don't count these as investment `\(\rightarrow\)` diverted resources look like waste `\(\rightarrow\)` measured TFP *falls* even as true productivity rises

- Later, accumulated intangibles generate output that appears as "free" productivity `\(\rightarrow\)` measured TFP *overstates* true gains

- Net error traces a J-curve: understatement, then overstatement, then convergence

- Adjusting for software intangibles alone, US TFP was 15.9% higher than official statistics by 2017

- Prediction: AI adoption will initially *slow* measured productivity growth
]


---

# Technology adoption lags across 166 countries &lt;br&gt; .small[&lt;span class="gray"&gt;Comin &amp; Hobijn (2010)&lt;/span&gt;]

.center-content[
- Average adoption lag between invention and widespread use: 45 years

- Lags are enormous and persistent

- Predictors of faster adoption: higher income, trade openness, human capital, institutional quality

- Technologies are adopted in clusters of complementary technologies, not in isolation
]


---

# Historical diffusion case studies &lt;br&gt; .small[&lt;span class="gray"&gt;Comin &amp; Hobijn (2010)&lt;/span&gt;]

.center-content[
| Technology | Invention | Widespread adoption | Lag |
|:-----------|:----------|:-------------------|:----|
| Spinning jenny | 1764 | ~1800–1830 | 35–65 years |
| Steam engine (Watt) | 1769 | ~1830–1850 | 60–80 years |
| Electricity | 1882 | ~1920–1940 | 40–60 years |
| Assembly line | 1913 | ~1930–1950 | 17–37 years |
| Computers | 1950s | ~1990–2000 | 30–40 years |
| Internet | 1991 | ~2005–2015 | 14–24 years |

]

---

# The diffusion of new technologies &lt;br&gt; .small[&lt;span class="gray"&gt;Kalyani, Bloom, Carvalho, Hassan, Lerner &amp; Tahoun (2025)&lt;/span&gt;]

.center-content[
- Text analysis of 3M US patents, 51M job postings, earnings calls (1976–2014) identifies 1,899 novel technology phrases; tracks geographic and occupational diffusion

- *Innovation is hyper-concentrated.* 56% of economically impactful technologies originate in 5 urban areas (Silicon Valley + Northeast Corridor)

- *Diffusion is slow* (`\(\approx\)` 50 years). High-skill jobs stay clustered near pioneers for decades; low-skill jobs spread faster as technologies mature

- *Skill bias persists but declines.* Early jobs: 57% require college; mean skill falls ~23 pp/yr; standardization (not training) drives skill broadening

- Pioneer locations retain advantages for generations
]

# Complementary reorganization as the bottleneck &lt;br&gt; .small[&lt;span class="gray"&gt;David (1990)&lt;/span&gt;]

.center-content[
- The computer productivity paradox mirrors the earlier case of electrification

- Electricity was available by the 1880s, but large factory productivity gains came only decades later

- The delay was not just slow adoption of electric motors
  - Factories first had to reorganize how production was organized around the new technology
  - Key shift was from factories powered by one central engine (*group drive*) to factories where individual machines had their own electric motors (*unit drive*)

]

# Framing &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász, Squicciarini &amp; Voigtländer (2024)&lt;/span&gt;]

.center-content[
- Diffusion lags, organizational adaptation, and the J-curve all suggest adoption is costly

- &lt;span class="gray"&gt;David (1990):&lt;/span&gt; electrification took 40 years to boost productivity because factories had to be redesigned from the ground up

- This paper: plant-level data from French cotton spinning during the Industrial Revolution

- Aggregate productivity gains came from reorganization, not uniform improvement — and took decades of trial-and-error
]

---

# Setting and strategy &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
- Mechanized cotton spinning in France, 1806–1840

- Spinning jenny led to factory-based production
  &gt; "One of the most dramatic sea changes in economic history" &lt;span class="gray"&gt;(Mokyr 2010)&lt;/span&gt;

- Adoption required shift from home production to factories

- Plant-level panel from French surveys (1800, 1840)

- Comparison sectors: metallurgy and paper (already plant-based by 1800 due to high fixed costs)

- This isolates the reorganization effect from common cross-sector technology shifts
]

---

# From home to firm-based production &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
&lt;img src="files/cotton.png" width="70%" style="display: block; margin: auto;" /&gt;
]

---

# Empirical design &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
- Difference-in-differences in productivity distributions across sectors

- Early (1800) vs. late (1840), after 1764 spinning jenny (French adoption ~1800)

- Treated (cotton spinning) vs. control (metallurgy &amp; paper milling)

- Outcome: log(output per worker)
]

---

# Main findings: Disappearing lower tail of productivity &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
&lt;img src="files/productivity_distribution_shift.png" width="80%" style="display: block; margin: auto;" /&gt;

- Short-run: highly dispersed productivity distribution in early cotton spinning

- Long-run: 82% productivity growth in cotton after adoption

---

# Main findings: Lower-tail bias &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
&lt;img src="files/productivity_distribution_shift_quantiles.png" width="90%" style="display: block; margin: auto;" /&gt;

- Cotton spinning: productivity growth concentrated in the lower tail
]

---

# Theory: Learning &amp; reorganization &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
  &gt; "The cotton mill [...] had to be invented as well as the spinning machinery per se." &lt;span class="gray"&gt;(Allen 2009)&lt;/span&gt;

- Factory layout: material flow, ventilation, fire hazard

- Management: hierarchies, instructions, scheduling, coordination

- Stylized framework:
  - Production has complementarity across organizational tasks
  - Plants draw efficiency indep. in each task; one bad task `\(\Rightarrow\)` low productivity `\(\Rightarrow\)` fat lower tail
  - Firms imitate best practice `\(\Rightarrow\)` lower tail disappears over time
]

---

# Evidence 1: Learning about mill design &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
&lt;img src="files/mill_design_convergence.png" width="85%" style="display: block; margin: auto;" /&gt;

- Early mills vary widely in shape and height; over time converge to 3–4 floors, rectangular

---

# Evidence 2: Spatial diffusion of know-how &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
- Plants `\(i\)` learn by observing successful experimenters
`$$\log(Y/L)_{ij} = \beta_0 + \beta_1 \log(\text{dist}_{p90})_{ij} + \text{FE}_j + \varepsilon_{ij}$$`
  - Log distance to the nearest 90th-percentile plant in the same sector is `\(\log(\text{dist}_{p90})\)`; `\(\text{FE}_j\)` denotes department fixed effects

- Result: proximity most impactful for spinning (less for metallurgy &amp; paper)
]

---

# Evidence 3: Technology vs. organization &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
- Are firms learning efficient organization or how to use the new technology?

- Evidence points to organization:
  1. High exit rates in cotton spinning (vs. metallurgy) despite all plants adopting technology
  2. Young plants more productive in cotton spinning in 1800, but not later or in metallurgy
]

---

# What do we learn? &lt;br&gt; .small[&lt;span class="gray"&gt;Juhász et al. (2024)&lt;/span&gt;]
.center-content[
- Technology adoption often requires complementary organizational innovation

- Gains materialize slowly through learning, entry, and exit

- Helps explain slow measured productivity gains from GPTs
]

# The direction of innovation &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
- So far: *neutral* technical change (productivity `\(\uparrow\)` across inputs)

- Real-world change is often *directed* to favor some factors
  - *Nineteenth century:* factory tech displaced skilled artisans (low-skill-biased)
  - *Twentieth century:* computers, software, automation complement skilled labor (high-skill-biased)

- Technical change can be "directed" toward specific factors of production (skilled labor, unskilled labor, capital)
]

---

# Skill-biased technical change

.center-content[
&lt;img src="files/college_wage_pr.png" width="60%" style="display: block; margin: auto;" /&gt;

.center[Despite rising supply of college-educated workers, the wage premium has risen]
]

---
# Two forces shaping innovation &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
Innovators compare the profitability of improving different factors.

- *Price effect.* A scarce factor is expensive, so an innovation that helps it is valuable per user
  - Innovation is pulled toward the scarce factor

- *Market size effect.* An abundant factor has more users, so there is a bigger market for technologies that help it
  - Innovation is pulled toward the abundant factor

- The direction of innovation depends on which force is stronger
]

---

# The role of elasticity of substitution `\(\sigma\)` &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
- Elasticity of substitution, `\(\sigma\)`, measures how easily one factor can replace another in production

- It determines whether the price effect or the market size effect dominates

- If `\(\sigma &gt; 1\)` (factors are good substitutes):
  - The market size effect dominates
  - Innovation tends to favor the more abundant factor

- If `\(\sigma &lt; 1\)` (factors are strong complements):
  - The price effect dominates
  - Innovation tends to favor the scarcer factor

- If `\(\sigma = 1\)`:
  - Relative factor supplies do not direct the bias of innovation
]

---

# The induced-bias hypotheses &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
- *Weak induced bias:*
  - If one factor becomes more abundant, innovation becomes biased toward that factor
  - This holds for any `\(\sigma \ne 1\)`

- *Strong induced bias:*
  - If `\(\sigma\)` is high enough, the induced shift in innovation is so strong that it can raise the relative reward of the now more abundant factor
  - In that case, the long-run relative demand curve can slope upward

- Application:
  - A rising supply of skilled workers can induce sufficiently skill-biased innovation that the skill premium rises rather than falls
]

---

# Graphical intuition &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
  &lt;div style="display: flex; justify-content: center; align-items: center; height: 500px; width: 100%;"&gt;

  &lt;/div&gt;
]

---

# Implications &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu (2002)&lt;/span&gt;]

.center-content[
- Twentieth-century skill bias:
  - A larger supply of educated workers made skill-complementary innovation more profitable

- Trade and technology:
  - Changes in relative prices can redirect innovation and amplify inequality effects

- Cross-country technology gaps:
  - Technologies are often designed for the factor supplies of rich countries
  - This can make them a poor fit for poorer countries with different labor abundance
]

---

# Induced automation innovation &lt;br&gt; .small[&lt;span class="gray"&gt;Hémous, Olsen, Zanella, Dechezleprêtre (2025)&lt;/span&gt;]

.center-content[
- Do higher wages induce firms to invent more automation technologies?

  - Use patent text to identify automation patents within machinery patents *(technology classes with unusually many words like `robot`, `automation`, or `CNC`)*  
  - Relate firms’ automation innovation to wages in the downstream markets they serve

- Findings:
  - Higher low-skill wages increase automation innovation strongly (elasticity: 2 to 5)
  - Higher high-skill wages tend to reduce automation innovation
  - The effect is specific to automation, not innovation in general

]

# Motivation and research question &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Directed technical change theories predict:
  1. Shocks to relative input supplies shift the direction of innovation
  2. Strong induced bias: innovation raises demand for the expanding input `\(\Rightarrow\)` price `\(\uparrow\)`

- Limited empirical evidence for either prediction

- Uses the US Civil War (1861–65) as an input supply shock for British cotton
  - Switch from US to Indian cotton `\(\Rightarrow\)` directs innovation in textile machinery
]

---

# Historical setting &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Before 1861: cotton was Britain's largest manufacturing sector; 77% of imports from US, 17% from India

- Civil War shock: Union blockade cuts US exports `\(\Rightarrow\)` British imports fall ~50%; mills turn to Indian cotton

- Indian cotton: shorter fibers, dirtier, harder to gin `\(\Rightarrow\)` existing machines poorly suited
]

---

# Data and measurement &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- *Patents (1855–1876).* British Patent Office, 146 categories; focus on *Preparation &amp; Spinning*
  - Treatment: technology for Indian cotton (gins, openers/scutchers, carders)
  - Quality proxies: 3-year renewal, journal mentions

- *Machine producer order books.* Document commercial adoption of new technologies

- *Waste rates.* Productivity proxy

- *Cotton prices and imports.* &lt;span class="gray"&gt;The Economist 1852–75&lt;/span&gt;
]

---

# Empirical strategy: Direction of innovation &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Difference-in-differences on patent counts:
`$$\log(\text{Patents}_{jt}) = a + b\cdot(\underset{\text{"Pre vs. post"}}{\text{Civil War}_t} \times \underset{\text{"Control vs. treated"}}{\text{India Tech}_j)} + w_j + o_t + e_{jt}$$`

  - Machinery type is indexed by `\(j\)`
  - Identifying assumption: absent the shock, Indian-cotton technologies follow similar trends as other textile technologies

- Year-by-year effects:
`$$\log(\text{Patents}_{jt}) = \alpha + \sum_{k=1859}^{1875} \beta_k (\text{Year}_k \times \text{India Tech}_j) + \Psi_j + \phi_t + \varepsilon_{jt}$$`
]

---

# Empirical strategy: Strong induced bias &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Relative price regressions:
`$$\text{Relative price}_{jt} = \alpha + \sum_{k=1859}^{1875} \gamma_k \, (\text{Year}_k \times \text{Indian cotton}_j) + \eta_j + \phi_t + Q_t + \varepsilon_{jt}$$`

  - Relative price: cotton `\(j\in\{\text{India, Brazil, Egypt}\}\)` vs. US; `\(Q_t\)`: quarter FE
  - Brazil and Egypt: also more abundant but little innovation (counterfactual)
]

---

# Results: Directed technical change &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Sharp rise in Indian-related patenting during Civil War: ~113% vs. other prep/spin categories
  - Starts 1861, peaks 1863, declines after

- Machine producers: Dobson &amp; Barlow introduced 4 new gin types in 4 years; filings align with models

- Waste in spinning Indian cotton fell 19–30% (1862–68), likely from improved fiber cleaning
]

---

&lt;img src="files/hanlon.png" width="90%" style="display: block; margin: auto;" /&gt;

---

# Results: Strong induced bias &lt;br&gt; .small[&lt;span class="gray"&gt;Hanlon (2015)&lt;/span&gt;]

.center-content[
- Indian/US relative price fell sharply in 1861–62

- Rebounded to pre-war levels by late 1862 despite abundance; remained high through early 1870s

- Counterfactual: Brazilian and Egyptian prices stayed low

- Demand shifts toward Indian cotton via tech change
]

---

# Technology and context &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Global R&amp;D is highly concentrated in the rich world: 25% in the US vs. 3.6% in Africa and South Asia combined

- Two opposing views:
  1. Ideas diffuse globally `\(\Rightarrow\)` tech progress reduces disparities
  2. Technology is context-specific `\(\Rightarrow\)` rich-country tech inappropriate elsewhere

- This paper tests the inappropriate technology hypothesis in global agriculture
]

---

# A motivating example: maize &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- US: faces the Corn Rootworm `\(\Rightarrow\)` major target of biotech R&amp;D

- Africa: faces the Maize Stalk Borer `\(\Rightarrow\)` little innovation

- GM maize effective in US, but inappropriate in Africa
]

---

# A model of inappropriate technology &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Farmers choose inputs and crops; innovators choose where to target R&amp;D

- Agricultural technology has:
  - General component (`\(A_k\)`): productivity boost everywhere
  - Context-specific adaptations (`\(B_{t,k,\ell}\)`): boost only if local feature `\(t\)` is present

- Innovators target `\(B\)` traits based on:
  - Local conditions are cheaper (knowledge, test fields)
  - Larger profits and market size in rich countries
  - IP protection stronger in rich countries

- Predictions:
  1. Innovation biased toward leader's environment
  2. Mismatch reduces diffusion
  3. Mismatch reduces output and productivity
]

---

# Inappropriate technology in agriculture &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Measurement: inappropriateness = dissimilarity of pest/pathogen environment
  - Global data on pests/pathogens (~5,000) and host-plants (~130)
  - Varies at the crop-by-location-pair level; merged with global data on plant variety development, diffusion, production

- Main results: inappropriateness inhibits frontier tech transfer and lowers productivity
  - Reduces international biotech diffusion and adoption
  - Distorts production decisions, lowering crop-specific output

- Explains 10–15% of global agricultural productivity gaps
  - New R&amp;D leaders (e.g., BRICs) `\(\Rightarrow\)` more appropriate tech for ecologically similar countries
  - Climate change shifts pest geography `\(\Rightarrow\)` changes appropriate technologies
]

---

# Crop, Pest, or Pathogen (CPP) mismatch &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Main measure: CPP mismatch for crop `\(k\)` between countries `\(\ell\)` and `\(\ell'\)`

`$$\text{CPP Mismatch}_{k,\ell,\ell'} = 1 - \frac{\text{Number of common CPPs}_{k,\ell,\ell'}}{\sqrt{\text{Number of CPPs}_{k,\ell} \times \text{Number of CPPs}_{k,\ell'}}}$$`

  - Numerator: shared CPPs; denominator: geometric mean (scale normalization)
  - Zero means complete overlap, and 1 means no overlap

- Validation via patent text: most country patents target locally present CPPs; most global patents target US-present crops
]

---

# Mismatch impedes technology diffusion &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Crop-by-origin-by-destination regression:

`$$\text{Technology Diffusion}_{k,\ell',\ell} = \beta \cdot \text{CPP Mismatch}_{k,\ell,\ell'}  + \varepsilon_{k,\ell,\ell'}$$`

  - Diffusion: transferred crop `\(k\)` varieties from `\(\ell'\)` to `\(\ell\)`
  - What is your main concern about this regression specification?
]

---

# Mismatch impedes technology diffusion &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
`$$\text{Technology Diffusion}_{k,\ell',\ell} = \beta \cdot \text{CPPMismatch}_{k,\ell,\ell'} \color{red}{+ \chi_{\ell,\ell'} + \chi_{k,\ell} + \chi_{k,\ell'}} + \varepsilon_{k,\ell,\ell'}$$`

  - Bilateral trade costs and distance are captured by `\(\chi_{\ell,\ell'}\)`
  - Crop-specific R&amp;D intensity in the origin is captured by `\(\chi_{k,\ell}\)`
  - Market opportunities, complementary inputs, and adoption barriers are captured by `\(\chi_{k,\ell'}\)`

- Hypothesis: `\(\beta &lt; 0\)` (context specificity depresses diffusion); `\(\beta = 0\)` under full transferability
]

---

# How much harm does inappropriateness do? &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- Translate output losses into global productivity effects

- Output depends on productivity *and* farmer decisions

- Use model to recover productivity effects:
  - Effect on productivity `\(= \beta / \eta\)` &lt;span class="gray"&gt;(CES demand; productivity `\(\sim\)` Frechet)&lt;/span&gt;
  - Output semi-elasticity with respect to mismatch is `\(\beta\)` &lt;span class="gray"&gt;(from regression)&lt;/span&gt;
  - Elasticity of crop choice with respect to productivity is `\(\eta\)` &lt;span class="gray"&gt;$(= 2.46)$ from Costinot et al. (2016)&lt;/span&gt;

- Accounts for equilibrium feedbacks: appropriate tech `\(\Rightarrow\)` supply `\(\uparrow\)` `\(\Rightarrow\)` prices `\(\downarrow\)` `\(\Rightarrow\)` planting `\(\downarrow\)`

.footnote[.small[Semi-elasticity: % change in output for a one-unit change in mismatch. `\(\beta = -7.14\)` means a 0-to-1 increase in mismatch lowers output by 7.14%.]]
]

- Largest losses in Africa &amp; Asia; smallest in Europe

- Countries with large mismatch are least productive today

# What we learn &lt;br&gt; .small[&lt;span class="gray"&gt;Moscona &amp; Sastry (2025)&lt;/span&gt;]

.center-content[
- R&amp;D is concentrated in ecologically distinct countries

- Mismatch limits tech transfer and output

- Inappropriateness reduces global productivity by 57.7% and explains 15–16% of cross-country gaps

- Who does R&amp;D and where pests move will shape future productivity
]

# The market provides too little incentive for innovation

.center-content[
- Ideas are non-rival and only partially excludable
- Innovators cannot capture the full social value they create
- Private equilibrium: MC = private marginal benefit
- Social optimum: MC = social marginal benefit &gt; private marginal benefit
- Result: underinvestment in innovation
- Policy responses: patents, R&amp;D subsidies, public research, procurement
]

---

# GPTs amplify the innovation market failure &lt;br&gt; .small[&lt;span class="gray"&gt;Bresnahan &amp; Trajtenberg (1995)&lt;/span&gt;]

.center-content[
- GPTs (steam, electricity, computers) magnify the standard innovation externality

  1. *Vertical:* GPT producers and downstream adopters each raise the value of the other's innovation, but neither internalizes the full gain

  2. *Horizontal:* one sector's adoption of the GPT raises incentives to improve it, and those improvements spill to other sectors
]

# Do patents encourage innovation? &lt;br&gt; .small[&lt;span class="gray"&gt;Moser (2005)&lt;/span&gt;]

.center-content[
- Do patent laws raise the rate of innovation, or do inventors find alternatives?

- Setting: 19th-century world's fairs (Crystal Palace 1851, Centennial 1876); countries with vs. without patent laws

- Countries without patents were not less innovative overall

- But patents shaped the *composition*: no-patent countries concentrated in industries where trade secrecy worked (chemicals, food processing)

- Patents matter more for direction than for level

.footnote[.small[Moser, Petra. 2005. "How Do Patent Laws Influence Innovation? Evidence from Nineteenth-Century World's Fairs." *American Economic Review*.]]
]

---

# Patents and the direction of innovation &lt;br&gt; .small[&lt;span class="gray"&gt;Moser (2005)&lt;/span&gt;]

.center-content[
- IP institutions channel innovation toward sectors where secrecy is insufficient

- Without patents: clusters in chemicals, food processing (easy to keep secret)

- With patents: spreads to machinery, instruments (harder to keep secret)

- IP design shapes *what* gets invented, not just *how much*

.footnote[.small[Moser, Petra. 2005. "How Do Patent Laws Influence Innovation? Evidence from Nineteenth-Century World's Fairs." *American Economic Review*.]]
]

# Do copyrights promote creativity? &lt;br&gt; .small[&lt;span class="gray"&gt;Giorcelli &amp; Moser (2020)&lt;/span&gt;]

.center-content[
- Does copyright protection raise creative output?

- Setting: Napoleon's conquest of Italian states (1796–1812) introduced copyrights of varying duration

- Copyright led to a significant rise in number and quality of new operas
  - Effects concentrated among the most productive composers
  - Longer duration had diminishing returns

- IP can stimulate creation, but optimal duration trades off incentives against access

.footnote[.small[Giorcelli, Michela, and Petra Moser. 2020. "Copyrights and Creativity: Evidence from Italian Opera during the Napoleonic Wars." *Journal of Political Economy*.]]
]

# Summary

.center-content[
- New technologies do not raise productivity immediately: diffusion is slow because adoption requires complementary know-how, reorganization, and intangible investment

- Innovation is endogenous and directed: changes in prices, market size, and factor supplies shape what gets invented and who benefits from it

- Technology is often context-specific: frontier innovation is tailored to frontier conditions, so diffusion can fail and rich-country innovation may be inappropriate elsewhere

- Markets alone do not deliver the socially optimal direction of innovation: institutions and policy shape not just how much innovation happens, but which sectors, places, and problems it serves
]
