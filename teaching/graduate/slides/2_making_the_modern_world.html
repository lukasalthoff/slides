# Recap: Climate change triggered the first phase change
&lt;span class="gray"&gt;~10,000 BCE&lt;/span&gt;

.center-content[
For 200,000 years, hunter-gatherer bands scattered across the globe. Ideas, people, and goods moved slowly, knowledge was oral, living standards barely changed

Then climate change triggered the first phase change

- Increasing seasonal variability forced hunter-gatherers to store food and settle down
- Storage, sedentism, agriculture &lt;span class="gray"&gt;(Matranga '24)&lt;/span&gt;
- Surplus, cities, states, writing, inequality
- Growth remained slow (~0.006% per year)
]

---

# From foragers to the modern world .small[[1/2]]

.center-content[
How did small bands of hunter-gatherers become complex civilizations?

1. **Nomadic bands to sedentary villages:** Seasonality, storage, sedentism, farming &lt;span class="gray"&gt;(Matranga '24)&lt;/span&gt;
    - Harsher winters forced food storage; settling down made agriculture likely

2. **Sedentary villages to cities:** Surplus, specialization, thicker markets &lt;span class="gray"&gt;(Smith '76; Glaeser '11)&lt;/span&gt;
    - Agriculture freed labor from food production
    - Finer division of labor where markets are thicker
    - Proximity: Ideas, tasks, deeper specialization

3. **Cities to states:** Visible, storable harvests enable tax &lt;span class="gray"&gt;(Mayshar, Moav &amp; Pascali '22)&lt;/span&gt;
    - Grain storable, visible, confiscatable
    - "History records no cassava states"
]

---

# From foragers to the modern world .small[[2/2]]

.center-content[
Once states emerged, why did some grow more than others?

4. **States to innovative states:** Geographic fragmentation, competition, innovation &lt;span class="gray"&gt;(Fernández-Villaverde et al. '23)&lt;/span&gt;
    - Europe: Rugged terrain, many polities; China: Core plains, unified empire
    - Competition spurred institutional innovation, openness

5. **Innovative states to colonial powers:** Extractive vs. inclusive institutions, persistence &lt;span class="gray"&gt;(Acemoglu, Johnson &amp; Robinson '01)&lt;/span&gt;
    - Settler mortality shaped what Europeans built overseas
    - Legacies still structure much of today's income gaps
]

# "Neolithic" = identified by shape of stone tools

.center-content[
Neolithic first identified by a change in the shape of stone tools

.center[**Paleolithic** = "Old Stone"&amp;emsp;&amp;emsp;&amp;emsp;**Neolithic** = "New Stone"]


&lt;img src="../../undergraduate/materials/paleo_stone_tool.png" width="30%" style="display: block; margin: auto;" /&gt;
]

---

# But technology is endogenous

.center-content[
Stone tools changed because the need for different tools arose
- **Paleolithic:** Hunter-gatherers subsisting on wild foods: Collecting, processing, consuming
- **Neolithic:** Humans became sedentary, grew their own food

Farming required different instruments for tilling, harvesting, and grinding grain
]

---

# Seasonality and the Invention of Agriculture &lt;br&gt; .small[&lt;span class="gray"&gt;Matranga '24&lt;/span&gt;]

.center-content[
- **Research question:** Why did humans transition from foraging to farming ~12,000 years ago?

- **Key argument:** Increasing climatic seasonality at the end of the last Ice Age made foraging less viable
    - Greater seasonal variation in food availability
    - Adapted by storing food and settling near reliable water sources
    - These behaviors were preconditions for agriculture
]

---

# The Ant and the Grasshopper &lt;br&gt; .small[&lt;span class="gray"&gt;Matranga '24&lt;/span&gt;]

.center-content[
- **Mechanism:** Seasonality forces storage, storage forces sedentism, sedentism enables agriculture

- **Evidence:**
    - Regions with greater increases in seasonality adopted agriculture earlier
    - Archaeological evidence of storage predates evidence of cultivation
    - Sedentary settlements appear before domesticated crops

- **Implication:** Agriculture not a sudden invention but an adaptation to environmental change
]

---

# What changed? Winters got harsher

.center-content[
- Climate seasonality increased: Summers got drier, winters got colder

- Needed to start storing food during good times

- End of nomadic lifestyles. Became sedentary near stored food

- Once sedentary and already storing, planting is the next step
]

.footnote[.small[Source: Matranga, "The Ant and the Grasshopper," *QJE* (2024).]]

---

# The sudden decision to settle down: Seven independent origins

.center-content[
Starting ~12,000 years ago, at least seven different groups independently began to settle down and farm:

- **Fertile Crescent** (~9,500 BC) — wheat, barley, sheep, goats
- **South China** (~7,000 BC) — rice
- **North China** (~6,000 BC) — millet, pigs
- **Mesoamerica** (~3,000 BC) — maize, squash, beans
- **Andes** (~3,000 BC) — potatoes, llamas
- **Sahel** (~3,000 BC) — sorghum, pearl millet
- **Eastern North America** (~2,500 BC) — sunflower, squash

**Puzzle:** How did these groups independently come to the same decision?
]

.footnote[.small[Source: Matranga, "The Ant and the Grasshopper," *QJE* (2024).]]

# After: The demographic explosion

.pull-left[
Sedentism dramatically increased how many children survived

- Nomadic: Can't have more than one young child per parent (someone has to carry them)

- Many childhood diseases survivable if you can stay in one warm place for a few weeks

- Nomadic, breastfeeding women often couldn't reach body fat threshold needed to conceive again for years
]

.pull-right[
Once sedentary, far more kids survive

And even if some groups wanted to remain nomadic:

- Farmers having more children who survive
- If there's ever conflict, farmers win by sheer numbers
]

.footnote[.small[Source: Matranga, in *The Atlantic* (2024).]]

# The data: Simulated climate meets archaeological adoption dates

.center-content[
**Climate data:** TraCE Dataset, CCSM3 climate model simulating global climate for the past 22,000 years

- Temperature and precipitation for every point on Earth, in 3.75° x 3.75° grid cells
- Aggregated into 44 periods of 500 years each

**Archaeological data:** When did each place adopt agriculture?

- Global adoption dates from archaeobotanical records
- Final sample: 587 cells warm and wet enough to farm
- 7 independently dated invention sites

**Key variable:** Temperature seasonality = avg. of warmest quarter − avg. of coldest quarter
]

.footnote[.small[Source: Matranga (2024), *QJE*.]]

# Archaeological evidence: Storage came BEFORE farming

.pull-left[
**Middle East**

- Became sedentary and built granaries before domesticating any crops
- Height declined upon settling down, even before cereals were common

**Pacific Northwest peoples**

- Lived in permanent villages, stored salmon
- Never adopted agriculture but followed same storage-and-settlement pattern
]

.pull-right[
**Why this matters**

Model predicts a sequence:

1. Seasonality increases
2. Hunter-gatherers settle down to store food
3. Sedentary life + storage makes farming almost inevitable

Archaeology confirms this exact sequence. Settlement and storage are the intermediate step, not a consequence of farming
]

.footnote[.small[Source: Matranga (2024), *QJE*, Section IV.]]

---

# The cost of farming: Skeletal evidence

.pull-left[
First farmers were worse off physically

- Shorter than hunter-gatherer ancestors
- More joint diseases, less skeletal robustness

But fewer growth-arrest lines, meaning less seasonal starvation

**Trade-off:** Eat less on average, but eliminate risk of starving in winter
]

.pull-right[
&lt;img src="../../undergraduate/materials/matranga5.png" width="95%" style="display: block; margin: auto;" /&gt;
]

.footnote[.small[Source: Matranga (2024), *QJE*; Cohen and Armelagos (1984).]]

# The Fertile Crescent's lucky draw

.center-content[
- 8 of 14 large domesticable mammals originated in the Fertile Crescent

- Wild grains (wheat, barley) were easy to cultivate and high in calories

- East–west axis of Eurasia allowed crops and animals to spread along similar latitudes

- Geography is not destiny, but it gave some regions a massive head start
]

.footnote[.small[Source: Diamond, *Guns, Germs and Steel*, Ch. 4.]]

---

# Agriculture created surplus, surplus changed everything

.center-content[
For the first time, one farmer could produce more food than their family needed

Surplus enabled:

- **Specialization** — potters, weavers, priests, soldiers
- **Cities** — large permanent settlements
- **Writing** — invented to track grain stores and debts
- **States** — organized taxation and defense
]

---

# Population exploded but living standards didn't

&lt;div style="display: flex; align-items: center; height: 480px; gap: 30px;"&gt;
&lt;div style="flex: 1;"&gt;
&lt;ul&gt;
&lt;li&gt;Agriculture supported far more people per square mile than foraging&lt;/li&gt;
&lt;li&gt;World population: 5 million (10,000 BC) → 250 million (1 AD)&lt;/li&gt;
&lt;li&gt;A 50x increase in 10,000 years&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div style="flex: 1;"&gt;
&lt;ul&gt;
&lt;li&gt;But per-capita income barely changed for thousands of years&lt;/li&gt;
&lt;li&gt;More people, same output per person&lt;/li&gt;
&lt;li&gt;This is the &lt;span style="color:#BF616A; font-weight:bold;"&gt;Malthusian trap&lt;/span&gt;: Every improvement in productivity was absorbed by population growth&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;

# The birth of inequality

&lt;div style="display: flex; align-items: center; height: 480px; gap: 30px;"&gt;
&lt;div style="flex: 1;"&gt;
&lt;p&gt;&lt;b&gt;Hunter-gatherer societies&lt;/b&gt; were broadly egalitarian:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;No permanent property&lt;/li&gt;
&lt;li&gt;No inherited wealth&lt;/li&gt;
&lt;li&gt;Leaders earned authority, didn't inherit it&lt;/li&gt;
&lt;li&gt;Sharing norms enforced equality&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;div style="flex: 1;"&gt;
&lt;p&gt;&lt;b&gt;Agricultural societies&lt;/b&gt; created hierarchy:&lt;/p&gt;
&lt;ul&gt;
&lt;li&gt;Surplus could be stored and hoarded&lt;/li&gt;
&lt;li&gt;Land became property&lt;/li&gt;
&lt;li&gt;Elites emerged: Kings, priests, warriors&lt;/li&gt;
&lt;li&gt;First slaves appeared&lt;/li&gt;
&lt;li&gt;Wealth was inherited&lt;/li&gt;
&lt;/ul&gt;
&lt;/div&gt;
&lt;/div&gt;

# Discussion

---

# Critique: Columbian Exchange bundled crops with disease and technology

.center-content[
- **Columbian Exchange** was not just a crop shock — bundled biological and technological transfer between Old and New Worlds &lt;span class="gray"&gt;(Crosby '72)&lt;/span&gt;

- **Disease channel:** Smallpox, measles, influenza caused 50–90% mortality among Indigenous populations, reshaping hierarchies independently of crops &lt;span class="gray"&gt;(Weil '07, '10)&lt;/span&gt;

- **Technology channel:** Europeans brought firearms, horses, steel, writing, bureaucratic institutions — all one-directional (Old to New World) and correlated with the cereal shock

- **Robustness check** drops formal colonies, but disease, technology, and trade extended beyond formal colonial boundaries
]

# The Fractured-Land Hypothesis &lt;br&gt; .small[&lt;span class="gray"&gt;Fernández-Villaverde et al. '23&lt;/span&gt;]

.center-content[
- **Research question:** Why did Europe develop differently from China?

- **Key argument:** Geographic fragmentation shaped political and economic development
    - Europe's fractured geography produced many competing states
    - China's open geography produced a unified empire
    - Competition among European states spurred institutional innovation
]

---

# Geographic Fragmentation and State Competition &lt;br&gt; .small[&lt;span class="gray"&gt;Fernández-Villaverde et al. '23&lt;/span&gt;]

.center-content[
- **Model:** Geographic barriers (mountains, rivers, coastlines) determine equilibrium number of polities

- **Mechanism:**
    - More fragmentation, more states, more competition
    - Competition produces better institutions, more innovation, less extractive governance
    - Unified empires face less competitive pressure, institutional stagnation

- **Evidence:**
    - Computational model calibrated to Eurasia's geography
    - Correctly predicts Europe's fragmentation vs. China's unification
    - Consistent with historical patterns of institutional divergence
]

---

# Social Infrastructure as the Fundamental Cause &lt;br&gt; .small[&lt;span class="gray"&gt;Hall &amp; Jones '99&lt;/span&gt;]

.center-content[
- **Research question:** Why does output per worker vary 35-fold across countries?

- **Levels accounting** decomposes gaps into capital, human capital, and a productivity residual
    - Among richest vs. poorest: Capital contributes 1.8x, human capital 2.2x, productivity 8.3x

- **Central hypothesis:** Social infrastructure — institutions and policies shaping incentives for production vs. diversion — is the fundamental determinant

- **Social infrastructure** works through all channels: Raises physical capital, human capital, *and* productivity
]

---

# Identification and results &lt;br&gt; .small[&lt;span class="gray"&gt;Hall &amp; Jones '99&lt;/span&gt;]

.center-content[
- **Measuring social infrastructure:** Government Anti-Diversion Policies index (law and order, corruption, expropriation risk) + Sachs-Warner openness

- **Instruments:** Distance from equator, predicted trade share, fraction speaking English or European language as mother tongue
    - Logic: Western European influence spread favorable institutions

- **Results:** 0.01 difference in social infrastructure associated with 5.14% difference in output per worker
    - Social infrastructure differences can account for 25–38-fold income gaps
]

---

# Critique: Language instruments are outcomes of colonization &lt;br&gt; .small[&lt;span class="gray"&gt;Hall &amp; Jones '99&lt;/span&gt;]

.center-content[
- **Language is endogenous:** Lots of English speakers in the US because Europeans settled en masse; they settled because mortality was low and land was temperate

- **Exclusion restriction** requires that language affects income *only through* social infrastructure
    - But conditions that determined settlement (disease, population density, agricultural suitability) could independently affect income

- **Overidentification test** does not reject, but such tests have low power

- **This is the problem** Acemoglu, Johnson &amp; Robinson ('01) tried to solve — going one step upstream to settler mortality rather than a downstream consequence of settlement
]

---

# The Colonial Origins of Comparative Development &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson '01&lt;/span&gt;]

.center-content[
- **Research question:** Do institutions cause economic prosperity?

- **Challenge:** Institutions are endogenous
    - Rich countries may adopt better institutions
    - Omitted variables (geography, culture) may drive both

- **Strategy:** Use colonial history as a natural experiment
    - Builds on Hall &amp; Jones ('99) but sharpens identification
]

---

# Settler Mortality as an Instrument &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson '01&lt;/span&gt;]

.center-content[
- **Identification:** Settler mortality shaped settlement patterns, which shaped institutions, which persist today

- **Two types of colonies:**
    1. Settler colonies (low mortality): Replicated European institutions (property rights, checks on government)
    2. Extractive colonies (high mortality): Set up extractive institutions (forced labor, expropriation)

- **Exclusion restriction:** Settler mortality affected institutions but does not directly affect income today
    - Threatened by: Persistent disease environment, selection of settler types, population composition
]

---

# Results: Institutions have a large causal effect on income &lt;br&gt; .small[&lt;span class="gray"&gt;Acemoglu, Johnson &amp; Robinson '01&lt;/span&gt;]

.center-content[
- **First stage:** Settler mortality strongly predicts current institutions
    - Higher mortality, worse protection against expropriation today

- **Second stage:** Institutions have a large causal effect on income
    - 2SLS estimates larger than OLS (attenuation bias from measurement error)
    - Effect survives controlling for geography, religion, colonial identity

- **Institutions over geography:** Once instrumented, geographic variables (latitude, distance from coast) lose explanatory power
]

---

# Critique: Settler mortality data are unreliable &lt;br&gt; .small[&lt;span class="gray"&gt;Albouy '12&lt;/span&gt;]

.center-content[
- Only 28 of 64 countries have mortality data from actual settlers or soldiers stationed in that colony

- Remaining 36 imputed from nearby countries, other time periods, or brief military campaigns
    - Many African observations from short expeditions (e.g., 1805 Niger expedition), not long-term settler mortality

- Dropping problematic observations weakens first stage substantially; IV estimates become fragile

- AJR published a response; debate never fully resolved
]

---

# Critique: Human capital, not institutions &lt;br&gt; .small[&lt;span class="gray"&gt;Glaeser, La Porta, Lopez-de-Silanes &amp; Shleifer '04&lt;/span&gt;]

.center-content[
- **Settlers brought human capital** (educated, skilled people), not just institutional blueprints
    - Schooling predicts growth at least as well; settler mortality predicts both institutions *and* human capital

- **Institutional measure is a policy outcome,** not a durable constraint
    - "Protection against expropriation risk" can change overnight with a new dictator
    - Substituting constitutional constraints (executive constraints, judicial independence): Relationship with growth disappears

- **East Asian challenge:** South Korea, Taiwan, Singapore had poor institutional scores in the 1960s, grew fast, *then* improved institutions
]

---

# Takeaway: Institutions matter for growth

.center-content[
- AJR remains among the most important papers in this literature &lt;span class="gray"&gt;(Nobel '24)&lt;/span&gt;

- Broad conclusion widely accepted: Institutions matter for development

- But identification less airtight than it appeared in 2001
    - Albouy: Mortality data unreliable for over half the sample
    - Glaeser et al.: Settler mortality predicts human capital just as well

- Cleanly separating institutions from human capital, geography, and disease remains an open problem
]
