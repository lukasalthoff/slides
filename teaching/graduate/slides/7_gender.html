# Three movements in female labor supply
.center-content[
- U-shape across development: High in agriculture → low in early industry as production leaves the home → rising with services and human capital .small[&lt;span class="gray"&gt;Goldin (1995); Olivetti, Petrongolo (2016); Ngai, Petrongolo (2017)&lt;/span&gt;]

- Quiet revolution (1970s–): Pill enabled long training incl. college reversal, from jobs to lifetime careers .small[&lt;span class="gray"&gt;Goldin (2006); Goldin, Katz, Kuziemko (2006)&lt;/span&gt;]

- Residual gap = parenthood gap: Concentrated in "greedy" occupations with convex returns to long, inflexible hours .small[&lt;span class="gray"&gt;Goldin (2014, 2021); Kleven, Landais, Søgaard (2019)&lt;/span&gt;]
]


---
# Drivers of change and persistence
.center-content[

- **Marriage bars.** Formal exclusions of married women from many occupations into 1950s .small[&lt;span class="gray"&gt;Goldin (1990)&lt;/span&gt;]

- **Discrimination.**

- **Contraception.** The pill lowered the cost of long professional training .small[&lt;span class="gray"&gt;Goldin, Katz (2002)&lt;/span&gt;]

- **Home production.** Durables freed time for market work; collective-household bargaining microfoundation .small[&lt;span class="gray"&gt;Greenwood, Seshadri, Yorukoglu (2005); Chiappori (1992)&lt;/span&gt;]

- **Labor technology.** Gender-biased technical change reshaped where women worked — milking machines pushed women off farms; typewriters opened clerical work; clinical-trial regulation shaped female-targeted innovation .small[&lt;span class="gray"&gt;Ager, Go&amp;ntilde;i, Salvanes (2026); Rashid (2026); Michelman, Msall (2024)&lt;/span&gt;]

- **Legal and political.** Suffrage and expansion of women's rights shifted spending and earnings; protective labor laws .small[&lt;span class="gray"&gt;Doepke, Tertilt (2009); Miller (2008); Doepke, Foerster, Hannusch, Tertilt (2025)&lt;/span&gt;]

- **Culture.** Plough hypothesis; transmission via mothers; identity norm against out-earning husbands .small[&lt;span class="gray"&gt;Alesina, Giuliano, Nunn (2013); Fernandez, Fogli, Olivetti (2004); Michalopoulos, Xue (2021); Bertrand, Kamenica, Pan (2015)&lt;/span&gt;]

]

# Origins and persistence of gender norms

.center-content[
- Gender inequality is pervasive across most parts of the world

- Why does gender play such a large role in shaping economic outcomes?

  - Many explanations of the **origins** are often about how biology interacts with societal/economic environment

    (e.g., returns to upper body strength in agricultural economies; childbearing)

    - But (1/2): Power and status are multi-dimensional (many dominated by women)
    - But (2/2): There are many examples of matriarchal* societies

  - Explanations of **persistence** often institutional (e.g., cultural, economic, legal)

.footnote[.small[* Matriarchal society: Women hold most of the power in political, economic, and social life. Example: Iroquois tribes of North America.]]
]

---
# Big picture view of literature on unequal gender norms

.center-content[
- Why do they emerge?
  - In some agricultural economies, men had physical advantage, concentrating power among them .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]

- Why do they persist even if initial reason vanishes?
  - Self-preservervation .small[&lt;span class="gray"&gt;Jayachandran 2015, Giuliano, Nunn 2021, Nunn (2021)&lt;/span&gt;]
  - Institutions (economic, religious, legal) that are complementary to unequal gender norms

- What are the economic consequences?
  - Inequality
  - Output .small[&lt;span class="gray"&gt;Duflo 2012, Hsieh et al. (2014)&lt;/span&gt;]

- How do they change?
  - Correction of higher-order beliefs .small[&lt;span class="gray"&gt;Bursztyn et al. (2020, 2024)&lt;/span&gt;]
  - Representation .small[&lt;span class="gray"&gt;Truffa, Wong (2025); Truffa et al. (2025)&lt;/span&gt;] &amp; Media .small[&lt;span class="gray"&gt;Rusche (2024)&lt;/span&gt;]
]

---
# Origins and persistence of gender norms &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
Natural-selection-like evolution of culture

- Historically, plough societies benefit from gender norms (gains from specialization)

- Industrialization presumably eliminates plough-specific advantage of gender norms

- But, norms seem to persist even after economy transitions out of agriculture
  1. Laws (e.g., unequal property rights)
  2. Economic systems complementary to gender norms
  3. Self-preservation (norms reduce information cost)
]

---
# Global differences in gender norms &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Vast cross-societal differences in both value-based survey responses and objective measures like female labor force participation

- "When jobs are scarce, men should have more right to a job than women" (WVS):
  - Proportion of the population that answers 'yes' they agree:
  - Iceland 3.6%; USA 10.6%; Rwanda 28%; Switzerland 35.1%
  - Japan 60%; Pakistan 79%; Egypt 94.9%

- Female labor force participation rates in 2000:
  - Burundi 93.2%; Tanzania 89.3%; Iceland 83.3%; USA 70.4%
  - Japan 59%; Italy 46%; Pakistan 30.3%; Egypt 21.5%
]

---
# Boserup's hypothesis &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
1. Certain parts of the world traditionally used plough agriculture

2. In these places, men had an advantage for work in the field
   - Person had to pull plough or control an animal that pulled plough
   - Use of plough leaves little need for weeding (a job in which women almost always specialize)
   - Plough agriculture was less compatible with simultaneous child care

3. Therefore, men tended to work in the field outside of the home, but not women

4. Belief that the home was the 'normal' place for women evolved

5. These beliefs continue to persist today (even after movement out of agriculture)
]

# This paper &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Document link between type of agriculture traditionally practiced and gender roles

  1. **Ethnic groups**

     Traditional plough agriculture `\(\Rightarrow\)` traditional gender roles

  2. **Countries**

     Traditional plough agriculture `\(\Rightarrow\)` objective country-level outcomes

  3. **Individuals**

     Traditional plough agriculture `\(\Rightarrow\)` self-reported attitudes and objective outcomes

  4. **Children of migrants to the US and Europe**

     Isolate the importance of factors internal vs. external to the individual
]

# Identification issues &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Ethnicities that adopted plough were different in many dimensions
  - `\(\rightarrow\)` Control for a wide range of observable ethnographic characteristics (at time of plough use)

- In particular, pre-existing values may have affected technology adoption
  - `\(\rightarrow\)` Exploit variation in ethnicity-level differences in the type of cereal crops that could be grown historically, conditioning on overall suitability for cultivation
]

# Causality: Instrumental variables &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Differences in extent to which crops benefit from introduction of plough
  - Length of planting season
  - Frequency of planting
  - Amount of land to be prepared
  - Qualities/characteristics of the soil that crops grown in (sloped, rocky, swampy, etc)

- Group crops into two categories .small[&lt;span class="gray"&gt;Pryor (1985)&lt;/span&gt;]
  1. **Plough-positive:** Wheat, barley, rye, teff, buckwheat, wet rice, industrial crops
  2. **Plough-negative:** Millet, sorghum, root crops, maize, dry rice, tree crops
]

# Constructing the instruments &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- `\(x_e^j\)`: area suitable for growing crop `\(j\)` in ethnic group `\(e\)` (within 200 km of centroid)

- Suitability of location of ethnic group `\(e\)` for growing plough-positive cereals:
`$$Area\,Share_e^{positive} = \frac{(x_e^{wheat} + x_e^{barley} + x_e^{rye})/3}{x_e^{all}}$$`

- Suitability of location of ethnic group `\(e\)` for growing plough-negative cereals is:
`$$Area\,Share_e^{negative} = \frac{(x_e^{sorghum} + x_e^{foxtail\,millet} + x_e^{pearl\,millet})/3}{x_e^{all}}$$`
]

# Identifying cultural transmission as mechanism &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Historical plough use may not have only affected norms, but also institutions, markets and policies, which may also impact our outcomes of interest

- To better identify a purely cultural channel, examine FLFP of second-generation immigrants living within the US and Europe
  - Same domestic institutions, markets, policies, but different cultural backgrounds

- Data on FLFP of immigrant daughters
  - Daughters of immigrants to US from CPS (1994-2009)
  - Daughters of immigrants to Europe from European Social Survey (2002-2011)
]

---
# Conclusions &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Evidence that historical plough use resulted in a culture of gender role inequality today

- Identify a causal effect of the plough using differences in geo-climatic conditions for cultivating plough-positive and plough-negative crops

- Examines US and European immigrants, we are able to hold constant the external environment, and examine cultural transmission as a channel
]

---
# Potential issues to consider &lt;br&gt; .small[&lt;span class="gray"&gt;Alesina et al. (2013)&lt;/span&gt;]
.center-content[
- Plough used virtually uniformly in some regions (e.g., Europe, North America)
- Exclusion restriction
- Bad controls
- Large coefficients vs. high `\(R^2\)` (plough use adds 0.06 to `\(R^2\)` in regression of female participation on controls)
- Exogeneity (were unequal societies more likely to adopt plough?)
- Confounders (wealthy countries both adopt plough and become more gender unequal; agricultural intensity)
- Measurement (missing language data)
]

---
# Alternative explanation &lt;br&gt; .small[&lt;span class="gray"&gt;Engels (1902)&lt;/span&gt;]
.center-content[
- Agrigultural intensity produced surplus
- Surplus allowed private property to develop
- Slight disadvantages in physical strength or social roles now give men an edge, making it easier for them to take control of private property
  - This point is debated because pre-agricultural societies had a large variety of gender roles
- Men imposed a system of patrilineal inheritance and other social structures
]
